<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Artifacts — Perk Mods</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:12px;padding-bottom:60px}
  .pagehead{padding:18px 0 6px}
  .filters{border:1px solid var(--line);background:var(--panel);padding:12px;margin-bottom:14px}
  .frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .frow:last-child{margin-bottom:0}
  .flabel{font-family:var(--disp);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--dim);width:74px;flex:0 0 auto}
  .fchip{font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;font-size:10.5px;padding:5px 10px;border:1px solid var(--line);color:var(--mut);background:transparent;cursor:pointer}
  .fchip:hover{border-color:var(--line-strong);color:var(--ink)}
  .fchip.on{color:#0b0c0d;font-weight:700}
  .fchip[data-el=Solar].on{background:var(--solar);border-color:var(--solar)}
  .fchip[data-el=Arc].on{background:var(--keep);border-color:var(--keep)}
  .fchip[data-el=Void].on{background:var(--void);border-color:var(--void)}
  .fchip[data-el=Stasis].on{background:#427cff;border-color:#427cff}
  .fchip[data-el=Strand].on{background:#38e266;border-color:#38e266}
  .fchip[data-el=Prismatic].on{background:#c17ad0;border-color:#c17ad0}
  .fchip[data-el=Key].on{background:var(--gold);border-color:var(--gold)}
  #q{flex:1;min-width:160px;padding:7px 10px;font-size:13px}
  .fmeta{color:var(--mut);font-size:12px;margin-left:auto}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,540px),1fr));gap:12px}
  .art{border:1px solid var(--line);border-left:2px solid var(--gold);background:var(--panel)}
  .art .ah{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line)}
  .art .an{font-family:var(--disp);color:var(--white);font-weight:500;letter-spacing:.03em;font-size:16px}
  .art .ao{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut)}
  .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
  .col{padding:10px;border-right:1px solid var(--line)}
  .col:last-child{border-right:0}
  .ch{font-family:var(--disp);text-transform:uppercase;letter-spacing:.1em;font-size:9.5px;color:var(--dim);margin-bottom:7px}
  .mod{padding:7px 0;border-top:1px solid rgba(255,255,255,.05)}
  .mod:first-of-type{border-top:0}
  .mod .mn{font-weight:600;font-size:12px;color:var(--ink)}
  .mod .md{font-size:11px;color:var(--mut);line-height:1.45;margin-top:2px}
  .mod.hit .mn{color:var(--gold)}
  .mod.dim{opacity:.22}
  .mod mark{background:rgba(207,174,66,.28);color:var(--white);padding:0 1px}
  .big{text-align:center;color:var(--mut);padding:30px 12px}
  @media(max-width:620px){ .cols{grid-template-columns:1fr} .col{border-right:0;border-top:1px solid var(--line)} .col:first-child{border-top:0} }
</style>

  [['Frost Renewal','Taking heavy damage while armored triggers a freeze burst and shields your allies.'],['Hail the Storm','Shattering Stasis crystals causes them to explode into highly damaging shrapnel.'],['Debilitating Wave','Finishers emit a massive shockwave matching your equipped Super element to blind or slow enemies.'],['Weakened Clear','Hitting a boss with a Grenade Launcher automatically reloads your other guns and weakens the target.'],['Retinal Burn','Burns an Armor Charge to make your Arc precision hits blind anything nearby.'],['Curative Orbs','Breaking an enemy shield drops an Orb of Power, and grabbing pickups heals you.'],['Void Renewal','Void kills spawn Breaches while Devour is running, and grabbing them reloads your heavy weapons.']],
  [['Brain Freeze','Frozen targets project a massive fog aura that actively slows nearby enemies.'],['Supernova','Picking up a Void Breach turns your next Void attack into a massive weakening pulse.'],['Conductive Cosmic Crystal','Arc and Void abilities deal completely unbalanced damage to Stasis-debuffed mobs.'],['Served Cold','Stasis Shards refund class energy, while Void Breaches instantly refund melee energy.'],['Kinetic Impacts','Spamming a Grenade Launcher creates shockwaves that easily stun Unstoppable Champions.'],['Arc Compounding','Arc weapons absolutely shred any target suffering from the Blind debuff.'],['Old God’s Rite','Shooting a Void gun after grabbing a Breach unleashes a swarm of tracking projectiles.']]

  [['Hold the Line','Reloads Machine Guns and Glaives instantly when surrounded and heals you on kills.'],['Dielectric','Killing Arc-debuffed enemies builds Bolt Charge and spits out free Orbs of Power.'],['Volatile Marksman','Landing Void headshots feeds you Volatile Rounds and refunds class ability energy.'],['Unraveling Orbs','Touching an Orb or a Tangle loads Unraveling Rounds directly into your Strand weapons.'],['Photonic Flare','Hitting severed or exhausted targets with Arc completely blinds them.'],['Elemental Siphon','Matches your kinetic kills to your Super element to drop fast elemental pickups.'],['Perpetual Destruction','Chain non-Exotic rocket kills to magically refund your heavy ammo reserves.']],

 ]},
 {name:'Implement of Curiosity',origin:'Reclamation',cols:[
  [['Fever and Chill','Fast headshots hand you Radiant for Solar weapons and Frost Armor for Stasis weapons.'],['Elemental Benevolence','Giving your fireteam an elemental buff secretly restores your own class ability energy.'],['Frost Renewal','Taking headshot damage while armored emits a freezing pulse to protect you.'],['Horde Shuttle','Shooting unraveled targets spawns aggressive Threadlings that sever on contact.'],['Refresh Threads','Touching Tangles or pickups refunds your weakest ability cooldown while using a Strand Super.'],['Pack Tactics','Threadling damage ramps up massively over time, eventually stunning Unstoppable Champions.'],['Semi-Auto Striker','Headshots with Bows, Snipers, or Scouts feed you Armor Charge if you are running low.']],

 {name:'Encrypted Data Disk',origin:'Lawless',cols:[

 ]}

// ---- filter taxonomy: subclass verbs (by element) + keywords ----
const VERBS={
 Solar:[['Radiant',/radiant/i],['Scorch',/scorch/i],['Ignite',/ignit/i],['Restoration',/restoration|cure/i]],
 Arc:[['Amplified',/amplif/i],['Jolt',/jolt/i],['Blind',/blind/i],['Bolt Charge',/bolt charge/i],['Ionic Trace',/ionic trace/i]],
 Void:[['Volatile',/volatile/i],['Weaken',/weaken/i],['Suppress',/suppress/i],['Overshield',/overshield/i],['Devour',/devour/i],['Void Breach',/breach/i],['Invisible',/invisib/i]],
 Stasis:[['Freeze',/freez|frozen/i],['Slow',/slow/i],['Shatter',/shatter/i],['Frost Armor',/frost armor/i],['Stasis Crystal',/crystal/i],['Stasis Shard',/shard/i]],
 Strand:[['Unravel',/unravel/i],['Sever',/sever/i],['Suspend',/suspend/i],['Woven Mail',/woven mail/i],['Threadling',/threadling/i],['Tangle',/tangle/i]],
 Prismatic:[['Transcendence',/transcend/i],['Prismatic',/prismatic/i]]
};
const KEYS=[
 ['Overload',/overload/i],['Unstoppable',/unstoppable/i],['Barrier',/barrier/i],['Champion',/champion/i],
 ['Grenade',/grenade(?! launcher)/i],['Melee',/melee/i],['Super',/super/i],['Finisher',/finisher/i],['Class ability',/class (ability|energy)/i],
 ['Orb of Power',/orb of power|orbs of power/i],['Armor Charge',/armor charge/i],['Heavy ammo',/heavy( ammo| weapon)/i],['Special ammo',/special ammo/i],
 ['Sword',/sword/i],['Rocket',/rocket/i],['Grenade Launcher',/grenade launcher/i],['Sniper',/sniper/i],['Bow',/bow/i],['Auto Rifle',/auto rifle/i],['Machine Gun',/machine gun/i],['Glaive',/glaive/i],['Fusion',/fusion/i],['Trace Rifle',/trace rifle/i],['Kinetic',/kinetic/i]
];

const active=new Set();   // active filter regexes (as their label)
const regexByLabel={};
Object.values(VERBS).flat().concat(KEYS).forEach(([lbl,rx])=>regexByLabel[lbl]=rx);
let q='';

function modText(m){return m[0]+' '+m[1];}
function matchesActive(m){ if(!active.size) return true; const t=modText(m); for(const lbl of active){ if(regexByLabel[lbl].test(t)) return true; } return false; }
function matchesSearch(m){ return !q || modText(m).toLowerCase().includes(q); }

function hl(text){ // highlight active-filter terms + search term
  let out=esc(text);
  const terms=[...active].map(l=>regexByLabel[l]);
  if(q) terms.push(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'));
  for(const rx of terms){ out=out.replace(new RegExp(rx.source,'ig'),m=>`<mark>${m}</mark>`); }
  return out;
}

function renderFilters(){
  const chip=(lbl,el)=>`<button class="fchip ${active.has(lbl)?'on':''}" data-el="${el}" data-lbl="${esc(lbl)}">${esc(lbl)}</button>`;
  let h='';
  for(const [el,list] of Object.entries(VERBS)){
    h+=`<div class="frow"><span class="flabel">${el}</span>${list.map(([l])=>chip(l,el)).join('')}</div>`;
  }
  h+=`<div class="frow"><span class="flabel">Keywords</span>${KEYS.map(([l])=>chip(l,'Key')).join('')}</div>`;
  h+=`<div class="frow"><span class="flabel">Search</span><input type="search" id="q" placeholder="any word in a mod name or description…" value="${esc(q)}">
      <button class="btn sm mut" id="clearBtn">Clear all</button><span class="fmeta" id="fmeta"></span></div>`;
  $('filters').innerHTML=h;
  $('q').oninput=e=>{q=e.target.value.trim().toLowerCase();render();};
  $('clearBtn').onclick=()=>{active.clear();q='';render();};
}

function render(){
  // re-sync chip states without losing focus on search box
  document.querySelectorAll('.fchip').forEach(c=>c.classList.toggle('on',active.has(c.dataset.lbl)));
  let shown=0, total=0;
  const filtering=active.size||q;
  $('grid').innerHTML=ARTIFACTS.map(a=>{
    let artHas=0;
    const cols=a.cols.map((col,ci)=>{
      const mods=col.map(m=>{
        total++;
        const hit=matchesActive(m)&&matchesSearch(m);
        if(hit){shown++;artHas++;}
        if(filtering&&!hit) return `<div class="mod dim"><div class="mn">${esc(m[0])}</div></div>`;
        return `<div class="mod ${filtering?'hit':''}"><div class="mn">${hit&&filtering?hl(m[0]):esc(m[0])}</div><div class="md">${hit&&filtering?hl(m[1]):esc(m[1])}</div></div>`;
      }).join('');
      return `<div class="col"><div class="ch">Col ${ci+1}</div>${mods}</div>`;
    }).join('');
    if(filtering&&!artHas) return '';
    return `<div class="art"><div class="ah"><span class="an">${esc(a.name)}</span><span class="ao">${esc(a.origin)}${filtering?` · ${artHas} match${artHas===1?'':'es'}`:''}</span></div><div class="cols">${cols}</div></div>`;
  }).join('')||'<div class="big">No mods match those filters.</div>';
  $('fmeta').textContent=filtering?`${shown} of ${total} mods`:`${total} mods across ${ARTIFACTS.length} artifacts`;
}

document.body.addEventListener('click',e=>{
  const c=e.target.closest('.fchip'); if(!c) return;
  const l=c.dataset.lbl; active.has(l)?active.delete(l):active.add(l); render();
});
renderFilters(); render();
</script>
