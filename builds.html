<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Crafter — Destiny Vault</title>
<style>
:root{
  --bg:#101312; --panel:#151821; --line:#2a2f3d; --ink:#e9ebf2; --mut:#8b93a7; --dim:#5c6375;
  --gold:#cdae32; --keep:#6de8f1; --rev:#e8b64c; --junk:#e0523a; --el:#f1631d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.45 "Segoe UI",Roboto,system-ui,sans-serif;padding:12px;padding-bottom:70px}
h1{font-size:22px;font-weight:600} h1 span{color:var(--gold)}
.sub{color:var(--mut);font-size:12px;margin:2px 0 14px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.btn{background:rgba(0,0,0,.35);border:1px solid var(--gold);color:var(--gold);padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.07em}
.btn:hover{background:rgba(205,174,50,.14)}
.btn.sm{padding:5px 10px;font-size:10.5px}
.btn.red{border-color:var(--junk);color:var(--junk)} .btn.red:hover{background:rgba(224,82,58,.12)}
.btn.mut{border-color:rgba(255,255,255,.22);color:var(--mut)} .btn.mut:hover{border-color:rgba(255,255,255,.45);color:var(--ink);background:rgba(255,255,255,.04)}
input[type=text]{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);color:var(--ink);padding:9px 12px;font-size:15px}
input[type=number]{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);color:var(--ink);padding:5px 7px;font-size:12.5px;width:60px;font-variant-numeric:tabular-nums}
.count{color:var(--mut);font-size:12px}
.note{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}

/* ---------- build cards (list) ---------- */
.bcard{display:flex;gap:16px;align-items:center;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.10);
  border-left:3px solid var(--el);padding:12px 16px;margin-bottom:10px;flex-wrap:wrap}
.bcard:hover{background:rgba(255,255,255,.045)}
/* Destiny-style diamond super */
.sdia{width:58px;height:58px;flex:0 0 auto;transform:rotate(45deg);border:1.5px solid var(--el);
  background:#0a0c0d;overflow:hidden;display:grid;place-items:center;margin:10px 12px;box-shadow:0 0 14px rgba(0,0,0,.6)}
.sdia img{width:70px;height:70px;transform:rotate(-45deg);object-fit:cover}
.sdia.lg{width:76px;height:76px;margin:14px 16px} .sdia.lg img{width:94px;height:94px}
.binfo{flex:1;min-width:220px}
.bname{font-weight:700;font-size:17px;color:#fff;letter-spacing:.01em}
.bmeta{color:var(--mut);font-size:11.5px;margin-top:2px}
.bmeta .elname{font-weight:600}
.chiprow{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.chip{border:1px solid rgba(255,255,255,.14);color:var(--mut);padding:2px 9px;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;background:rgba(0,0,0,.3)}
.chip.on{border-color:var(--keep);color:var(--keep)}
.chip.warn{border-color:var(--rev);color:var(--rev)}
.chip.alert{border-color:var(--gold);color:var(--gold);background:rgba(205,174,50,.12)}
/* mini stat meters current vs min */
.meters{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.meter{width:86px}
.meter .ml{display:flex;justify-content:space-between;font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.meter .ml b{color:var(--ink);font-variant-numeric:tabular-nums}
.meter .ml b.met{color:#6ede9b} .meter .ml b.unmet{color:var(--junk)}
.mtrack{height:4px;background:rgba(255,255,255,.10);margin-top:3px;position:relative}
.mfill{height:100%;background:var(--el);opacity:.9}
.mmin{position:absolute;top:-2px;width:2px;height:8px;background:#fff;opacity:.7}
/* exotic tile */
.xtile{width:54px;height:54px;flex:0 0 auto;border:1.5px solid var(--gold);background:#0a0c0d;position:relative}
.xtile img{width:100%;height:100%;object-fit:cover;display:block}
.xtile.empty{display:grid;place-items:center;color:var(--dim);font-size:9px;text-align:center;border-style:dashed;border-color:rgba(255,255,255,.25)}
.bacts{display:flex;flex-direction:column;gap:6px;align-items:flex-end;margin-left:auto}

/* ---------- editor ---------- */
.ecard{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.10);padding:16px 18px;margin-bottom:12px}
.ecard h3{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.ecard h3::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.ecard h3 .btn{margin-left:auto}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:860px){.two{grid-template-columns:1fr}}
/* subclass summary strip */
.subsum{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.abrow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.abslot{display:flex;flex-direction:column;align-items:center;width:52px}
.abslot .lab{font-size:8.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;text-align:center}
.abico{width:46px;height:46px;border:1px solid rgba(255,255,255,.16);background:#0a0c0d}
.abico img{width:100%;height:100%;object-fit:cover;display:block}
.abico.emptyab{border-style:dashed;display:grid;place-items:center;color:var(--dim);font-size:14px}
.abico.frag{width:38px;height:38px}
/* stat goal rows */
.statrow{display:grid;grid-template-columns:24px 24px 92px 1fr 1fr 70px;gap:10px;align-items:center;
  padding:9px 12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);margin-bottom:5px;cursor:grab}
.statrow.dragging{opacity:.35;border-color:var(--gold)}
.statrow .grip{color:var(--dim);font-size:14px}
.statrow .rank{color:var(--el);font-weight:800;font-variant-numeric:tabular-nums}
.statrow .sname{font-weight:700;letter-spacing:.02em}
.sctl{display:flex;align-items:center;gap:8px}
.sctl .t{font-size:9px;color:var(--dim);text-transform:uppercase;width:24px}
.sctl input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,.14);cursor:pointer;min-width:70px}
.sctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--el);border:1px solid #000;cursor:pointer}
.sctl input[type=range]::-moz-range-thumb{width:13px;height:13px;background:var(--el);border:1px solid #000;border-radius:0;cursor:pointer}
.nowv{font-size:11.5px;color:var(--keep);text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:760px){.statrow{grid-template-columns:20px 20px 76px 1fr;row-gap:6px}.statrow .sctl:nth-of-type(2){grid-column:3/5}.nowv{grid-column:4;text-align:left}}
/* element tabs */
.eltabs{display:flex;gap:6px;flex-wrap:wrap}
.eltab{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);color:var(--mut);padding:7px 14px;cursor:pointer;
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-family:inherit}
.eltab.on{color:var(--elc);border-color:var(--elc);background:rgba(0,0,0,.5);box-shadow:inset 0 -2px 0 var(--elc)}
.clstab{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);color:var(--mut);padding:7px 16px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-family:inherit}
.clstab.on{color:#fff;border-color:#fff;background:rgba(255,255,255,.08)}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;background:rgba(3,5,6,.82);backdrop-filter:blur(3px);z-index:9500;overflow:auto;padding:26px 12px;display:flex;justify-content:center;align-items:flex-start}
.mbox{background:var(--bg);border:1px solid rgba(255,255,255,.22);max-width:1020px;width:100%;padding:20px 24px 26px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.mbox h2{font-size:16px;color:#fff;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.mclose{margin-left:auto;background:none;border:1px solid rgba(255,255,255,.25);color:var(--mut);font-size:13px;padding:5px 12px;cursor:pointer}
.mclose:hover{color:#fff;border-color:#fff}
.msec{margin:16px 0}
.msec h4{font-size:10.5px;color:var(--el);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;display:flex;gap:10px;align-items:baseline}
.msec h4 small{color:var(--dim);letter-spacing:.03em;text-transform:none;font-size:10.5px}
.pgrid{display:flex;gap:10px;flex-wrap:wrap}
.pk2{width:66px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
.pk2 .fr{display:block;overflow:hidden;width:58px;height:58px;margin:0 auto;border:1px solid rgba(255,255,255,.18);background:#0a0c0d;position:relative;transition:box-shadow .12s,border-color .12s}
.pk2 .fr img{width:100%;height:100%;object-fit:cover;display:block;opacity:.82}
.pk2:hover .fr img{opacity:1}
.pk2.on .fr{border-color:var(--el);box-shadow:0 0 0 1px var(--el),0 0 14px color-mix(in srgb,var(--el) 60%,transparent)}
.pk2.on .fr::after{content:'✓';position:absolute;top:-7px;right:-7px;width:16px;height:16px;background:var(--el);color:#000;font-size:11px;font-weight:800;display:grid;place-items:center}
.pk2.on .fr img{opacity:1}
.pk2 .nm2{display:block;font-size:9.5px;color:var(--mut);margin-top:4px;text-align:center;line-height:1.25;max-height:24px;overflow:hidden}
.pk2.on .nm2{color:var(--ink)}
.pk2 .statchip{display:block;margin:2px auto 0;font-size:8.5px;color:var(--keep);text-align:center}
.pk2.sm{width:54px}.pk2.sm .fr{width:46px;height:46px}
/* exotic modal tiles */
.xg{display:flex;gap:12px;flex-wrap:wrap}
.xpick{width:96px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
.xpick .fr{display:block;overflow:hidden;width:72px;height:72px;margin:0 auto;border:1.5px solid #6a5a1e;background:#0a0c0d;position:relative}
.xpick .fr img{width:100%;height:100%;object-fit:cover;display:block}
.xpick:hover .fr{border-color:var(--gold)}
.xpick.on .fr{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 16px rgba(205,174,50,.5)}
.xpick.on .fr::after{content:'✓';position:absolute;top:-7px;right:-7px;width:16px;height:16px;background:var(--gold);color:#000;font-size:11px;font-weight:800;display:grid;place-items:center}
.xpick .nm2{display:block;font-size:9.5px;color:var(--mut);margin-top:4px;text-align:center;line-height:1.25}
.xpick.on .nm2{color:var(--gold)}
.xpick .sl{display:block;font-size:8.5px;color:var(--dim);text-align:center}
.pk2 .statchip{display:block}
/* set bonus */
select{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);color:var(--ink);padding:7px 10px;font-size:13px;max-width:100%}
.wantchips{display:flex;gap:6px;margin-top:8px}
.setdesc{font-size:11.5px;color:var(--mut);margin-top:8px;line-height:1.5}
.setdesc b{color:var(--ink)}
/* champion strip + suggestions */
.champ{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.cpiece{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.10);padding:8px;width:158px;display:flex;gap:8px}
.cpiece .ci{width:44px;height:44px;flex:0 0 auto;border:1px solid rgba(255,255,255,.14)}
.cpiece.xp .ci{border-color:var(--gold)}
.cpiece .ci img{width:100%;height:100%;object-fit:cover;display:block}
.cpiece .cn{font-size:11px;font-weight:600;line-height:1.25;overflow:hidden}
.cpiece .cs{font-size:9.5px;color:var(--mut);line-height:1.5}
.cpiece .ct{font-size:9px;color:var(--rev)}
.cpiece.miss{border-color:var(--junk);color:var(--junk);font-size:11px;align-items:center}
.totrow{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;margin:8px 0}
.totrow b.met{color:#6ede9b} .totrow b.unmet{color:var(--junk)}
.sugg{border:1px solid rgba(255,255,255,.08);border-left:3px solid rgba(255,255,255,.15);padding:9px 12px;margin-bottom:6px;font-size:12.5px;background:rgba(0,0,0,.22)}
.sugg.fresh{border-left-color:var(--gold)}
.sugg .tn{color:var(--rev);font-size:11px;margin-top:3px}
.sugg .fb{color:var(--gold);font-weight:700;font-size:10px;letter-spacing:.08em}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(min-width:900px){body{max-width:1160px;margin:0 auto}}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<div id="gbanner"></div>
<h1 class="disp">Build <span>Crafter</span></h1>
<p class="sub">Subclass builds with stat goals — the app watches your vault and suggests upgrades, with the why. It never moves or tags armor by itself.</p>
<div class="bar" id="topBar">
  <button class="btn" id="newBtn">+ New build</button>
  <button class="btn mut" id="importBtn">Import DIM loadouts</button>
  <button class="btn mut sm" id="delDraftsBtn">Delete all DIM drafts</button>
  <span class="count" id="status"></span>
</div>
<div id="main"></div>
<div id="modal"></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const BN='https://www.bungie.net';
const STATKEYS=['w','h','c','g','s','m'];
const STATN={w:'Weapons',h:'Health',c:'Class',g:'Grenade',s:'Super',m:'Melee'};
const ELEMS=[['arc','Arc'],['solar','Solar'],['void','Void'],['stasis','Stasis'],['strand','Strand'],['prism','Prismatic']];
const ELCOL={arc:'#7aecf3',solar:'#f1631d',void:'#a777c5',stasis:'#4d88ff',strand:'#35e366',prism:'#d9b3ff'};
const SLOTS=['Helmet','Gauntlets','Chest','Leg','Class Item'];
let BUILDS=[], CAT=null, INSIGHTS={}, ARMOR=null, SUG={}, edit=null, openSug=new Set();

function tipInit(){
  if(!window.PerkTip||!CAT) return;
  const pd={};
  for(const cls of Object.values(CAT))for(const el of Object.values(cls))for(const list of Object.values(el))for(const x of list)if(x.dsc)pd[x.n]=x.dsc;
  PerkTip.init({perkDescs:pd,perkInsights:INSIGHTS});
}
async function load(){
  $('status').textContent='Loading…';
  try{
    const [b,c,a]=await Promise.all([
      fetch('/api/builds').then(r=>r.json()),
      CAT?Promise.resolve(null):fetch('/api/subclass-catalog').then(r=>r.json()),
      fetch('/api/armor').then(r=>r.json()),
    ]);
    BUILDS=b.builds||[];
    if(c){ CAT=c.catalog||c; INSIGHTS=c.insights||{}; }
    ARMOR=a;
    tipInit();
    $('status').textContent=`${BUILDS.length} build${BUILDS.length===1?'':'s'}`;
    render();
    refreshSug();
  }catch(err){ $('status').textContent='Load failed: '+err.message; }
}
async function refreshSug(){
  try{ const s=await fetch('/api/builds/suggestions').then(r=>r.json()); SUG=s.builds||{}; if(!edit) render(); }catch(e){}
}
window.GRELOAD=()=>{ if(!edit) load(); };   // don't yank the editor out from under an edit
window.addEventListener('load',tipInit);

const elName=v=>(ELEMS.find(e=>e[0]===v)||['',v])[1];
const catOf=b=>(CAT&&CAT[b.cls]&&CAT[b.cls][b.elem])||{supers:[],grenades:[],melee:[],classAbilities:[],movement:[],aspects:[],fragments:[]};
const plugOf=(b,kind,h)=>catOf(b)[kind]&&catOf(b)[kind].find(x=>x.h===h);
// Exotic helpers: the same exotic exists under multiple hashes (reissues), so the picker
// dedupes by NAME (best copy: highest tier, then total base) and lookups match hash OR name.
const exoPickList=()=>{ const m={}; for(const i of (ARMOR?ARMOR.items:[])) if(i.x){ const c=m[i.n]; if(!c||i.t>c.t||(i.t===c.t&&i.tot>c.tot)) m[i.n]=i; } return Object.values(m); };
const exoOf=b=>{ if(!b.exotic||(!b.exotic.hash&&!b.exotic.n)) return null;
  let best=null; for(const i of (ARMOR?ARMOR.items:[])){ if(!i.x) continue;
    if(i.hash===b.exotic.hash||(b.exotic.n&&i.n===b.exotic.n)){ if(!best||i.t>best.t||(i.t===best.t&&i.tot>best.tot)) best=i; } }
  return best; };
function fragCap(b){ return b.plugs.aspects.reduce((n,h)=>n+((catOf(b).aspects.find(a=>a.h===h)||{}).frag||0),0); }

function render(){ $('main').innerHTML=''; $('modal').innerHTML=''; if(edit) renderEditor(); else renderList(); }

/* ---------------- list ---------------- */
function renderList(){
  if(!BUILDS.length){ $('main').innerHTML='<div class="ecard"><p class="count">No builds yet — press <b>+ New build</b>, or import your DIM loadouts.</p></div>'; return; }
  $('main').innerHTML=BUILDS.map(b=>{
    const col=ELCOL[b.elem]||'#888';
    const sup=plugOf(b,'supers',b.plugs.super);
    const exo=exoOf(b);
    const sug=SUG[b.id];
    const nSug=sug?sug.suggestions.length:0;
    const T=sug?sug.champion.totals:null;
    return `<div class="bcard" style="--el:${col}">
      <div class="sdia">${sup?`<img src="${BN}${sup.icon}" alt="" loading="lazy" data-pn="${esc(sup.n)}">`:''}</div>
      <div class="xtile ${exo?'':'empty'}" ${exo?`data-pn="${esc(exo.n)}"`:''} title="${exo?esc(exo.n):'no exotic picked'}">${exo&&exo.icon?`<img src="${BN}${exo.icon}" alt="" loading="lazy">`:(exo?'':'NO<br>EXOTIC')}</div>
      <div class="binfo">
        <div class="bname">${esc(b.name||'(unnamed build)')}</div>
        <div class="bmeta">${b.cls} · <span class="elname" style="color:${col}">${elName(b.elem)}</span>
          ${exo?` · ${esc(exo.n)}`:b.exotic?.hash?' · exotic not owned':''}
          ${b.setBonus&&b.setBonus.want?` · ${b.setBonus.want}pc ${esc(b.setBonus.name)}`:''}
          · ${b.prio.slice(0,3).map(k=>STATN[k]).join(' › ')}…</div>
        ${T?`<div class="meters">${b.prio.slice(0,4).map(k=>{
          const v=T[k]||0,min=b.min[k]||0;
          return `<div class="meter"><div class="ml"><span>${STATN[k]}</span><b class="${min?(v>=min?'met':'unmet'):''}">${v}${min?'<span style="color:var(--dim);font-weight:400">/'+min+'</span>':''}</b></div>
            <div class="mtrack"><div class="mfill" style="width:${Math.min(100,v/2)}%"></div>${min?`<div class="mmin" style="left:${Math.min(100,min/2)}%"></div>`:''}</div></div>`;
        }).join('')}</div>`:''}
        <div class="chiprow">
          <span class="chip ${b.watch?'on':''}">${b.watch?'watching drops':'watch off'}</span>
          ${b.draft?'<span class="chip warn">draft — finish &amp; save</span>':''}
          ${b.src==='dim'?'<span class="chip">from DIM</span>':''}
          ${nSug?`<span class="chip alert">${nSug} upgrade${nSug>1?'s':''}</span>`:''}
          ${sug&&sug.champion.exoticMissing?'<span class="chip warn">exotic not in vault</span>':''}
          ${sug&&sug.champion.setGaps&&sug.champion.setGaps.length?`<span class="chip warn">set gap: ${esc(String(sug.champion.setGaps[0]))}</span>`:''}
        </div>
      </div>
      <div class="bacts">
        <button class="btn sm" data-edit="${b.id}">Edit</button>
        <button class="btn sm mut" data-sug="${b.id}">${openSug.has(b.id)?'Hide':'Suggestions'}${nSug?` (${nSug})`:''}</button>
      </div>
      ${openSug.has(b.id)?`<div style="flex-basis:100%">${renderSug(b)}</div>`:''}
    </div>`;
  }).join('');
}

function renderSug(b){
  const sug=SUG[b.id];
  if(!sug) return '<p class="note">No suggestion data yet — pick the exotic anchor first.</p>';
  const ch=sug.champion;
  const strip=SLOTS.map(slot=>{
    const p=ch.slots[slot];
    if(!p) return `<div class="cpiece miss">${slot}: none${slot===b.exotic?.slot?' (exotic missing)':''}</div>`;
    const it=ARMOR&&ARMOR.items.find(i=>i.id===p.id);
    return `<div class="cpiece ${p.x?'xp':''}"><div class="ci">${it&&it.icon?`<img src="${BN}${it.icon}" alt="" loading="lazy">`:''}</div>
      <div><div class="cn" title="${esc(p.n)}">${esc(p.n)}</div>
      <div class="cs">${slot} · T${p.t} · ${b.prio.slice(0,2).map(k=>`${STATN[k].slice(0,3)} ${p.s[k]||0}`).join(' · ')}</div>
      ${p.tune?`<div class="ct">${esc(p.tune)}</div>`:''}</div></div>`;
  }).join('');
  const suggs=sug.suggestions.length?sug.suggestions.slice(0,20).map(x=>`<div class="sugg ${x.fresh?'fresh':''}">
      ${x.fresh?'<div class="fb">NEW DROP</div>':''}<div>${esc(x.text)}</div>
      ${x.tuneNote?`<div class="tn">${esc(x.tuneNote)}</div>`:''}
    </div>`).join('')+(sug.suggestions.length>20?`<p class="note">…and ${sug.suggestions.length-20} more.</p>`:'')
    :'<p class="note">No upgrades in the vault right now — your current best set stands.</p>';
  return `<div style="border-top:1px solid rgba(255,255,255,.08);margin-top:10px;padding-top:10px">
    <h3 style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Current best set</h3>
    <div class="champ">${strip}</div>
    <div class="totrow">${b.prio.map(k=>{const v=ch.totals[k]||0,min=b.min[k]||0;return `<span>${STATN[k]} <b class="${min?(v>=min?'met':'unmet'):''}">${v}</b>${min?`<span class="count">/${min}</span>`:''}</span>`;}).join('')}</div>
    <h3 style="font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin:8px 0 6px">Upgrade suggestions</h3>
    ${suggs}
    <button class="btn sm mut" data-ack="${b.id}">Mark reviewed</button>
  </div>`;
}

/* ---------------- editor ---------------- */
function blankBuild(){
  return { name:'', cls:'Warlock', classType:2, elem:'solar',
    plugs:{super:0,grenade:0,melee:0,classAbility:0,movement:0,aspects:[],fragments:[]},
    exotic:{hash:0,slot:''}, setBonus:{name:'',want:0}, prio:STATKEYS.slice(),
    min:Object.fromEntries(STATKEYS.map(k=>[k,0])), max:Object.fromEntries(STATKEYS.map(k=>[k,200])),
    watch:true, draft:false, src:'manual' };
}
const abIco=(x,lab,cls)=>`<div class="abslot"><div class="abico ${cls||''} ${x?'':'emptyab'}" ${x?`data-pn="${esc(x.n)}" title="${esc(x.n)}"`:''}>${x?`<img src="${BN}${x.icon}" alt="" loading="lazy">`:'+'}</div><div class="lab">${lab}</div></div>`;

function renderEditor(){
  const b=edit;
  const col=ELCOL[b.elem]||'#888';
  const cat=catOf(b);
  const cap=fragCap(b);
  if(b.plugs.fragments.length>cap) b.plugs.fragments=b.plugs.fragments.slice(0,cap);
  const sup=plugOf(b,'supers',b.plugs.super);
  const exo=exoOf(b);
  const sug=SUG[b.id];
  const sets=ARMOR?Object.keys(ARMOR.sets||{}).sort():[];
  const sb=b.setBonus||{name:'',want:0};
  const setInfo=sb.name&&ARMOR.sets[sb.name];
  $('main').innerHTML=`<div style="--el:${col}">
  <div class="bar">
    <button class="btn mut sm" id="backBtn">← All builds</button>
    <input type="text" id="bName" value="${esc(b.name)}" placeholder="Build name (e.g. Solar Melee Warlock)" style="flex:1;min-width:220px" class="disp">
    <label class="chip" style="cursor:pointer;display:flex;align-items:center;gap:7px;padding:6px 12px">watch drops
      <input type="checkbox" id="bWatch" ${b.watch?'checked':''} style="accent-color:var(--gold);width:14px;height:14px"></label>
  </div>
  <div class="bar">
    ${['Titan','Hunter','Warlock'].map(c=>`<button class="clstab ${b.cls===c?'on':''}" data-cls="${c}">${c}</button>`).join('')}
    <span style="width:14px"></span>
    <span class="eltabs">${ELEMS.map(([v,t])=>`<button class="eltab ${b.elem===v?'on':''}" style="--elc:${ELCOL[v]}" data-elem="${v}">${t}</button>`).join('')}</span>
  </div>

  <div class="ecard">
    <h3>Subclass <button class="btn sm" id="editSubBtn">Edit subclass</button></h3>
    <div class="subsum">
      <div class="sdia lg">${sup?`<img src="${BN}${sup.icon}" alt="" data-pn="${esc(sup.n)}">`:''}</div>
      <div>
        <div class="abrow">
          ${abIco(plugOf(b,'classAbilities',b.plugs.classAbility),'Class')}
          ${abIco(plugOf(b,'movement',b.plugs.movement),'Move')}
          ${abIco(plugOf(b,'melee',b.plugs.melee),'Melee')}
          ${abIco(plugOf(b,'grenades',b.plugs.grenade),'Grenade')}
          <span style="width:14px"></span>
          ${b.plugs.aspects.map(h=>abIco(cat.aspects.find(a=>a.h===h),'Aspect')).join('')}
          ${b.plugs.aspects.length<2?abIco(null,'Aspect'):''}
        </div>
        <div class="abrow" style="margin-top:8px">
          ${b.plugs.fragments.map(h=>abIco(cat.fragments.find(f=>f.h===h),'Frag','frag')).join('')}
          ${b.plugs.fragments.length<cap?abIco(null,'Frag','frag'):''}
          ${cap===0?'<span class="note">pick aspects to unlock fragment slots</span>':''}
        </div>
      </div>
    </div>
    <p class="note">Hover any icon for its description and community insights (same data DIM shows).</p>
  </div>

  <div class="two">
    <div class="ecard">
      <h3>Exotic anchor <button class="btn sm" id="editExoBtn">${exo?'Change':'Choose exotic'}</button></h3>
      ${exo?`<div style="display:flex;gap:12px;align-items:center">
        <div class="xtile" style="width:64px;height:64px" data-pn="${esc(exo.n)}">${exo.icon?`<img src="${BN}${exo.icon}" alt="">`:''}</div>
        <div><div style="color:var(--gold);font-weight:700">${esc(exo.n)}</div>
        <div class="count">${exo.slot} · best copy T${exo.t} · ${exo.tot} base</div></div>
      </div>`:'<p class="note">Every build revolves around one exotic armor piece — choose it to unlock suggestions.</p>'}
    </div>
    <div class="ecard">
      <h3>Set bonus</h3>
      <select id="sbName"><option value="">No set preference</option>${sets.map(s=>`<option ${sb.name===s?'selected':''}>${esc(s)}</option>`).join('')}</select>
      <div class="wantchips">
        ${[[0,'Off'],[2,'2-piece'],[4,'4-piece']].map(([v,t])=>`<button class="btn sm ${sb.want===v?'':'mut'}" data-want="${v}">${t}</button>`).join('')}
      </div>
      ${setInfo?`<div class="setdesc"><b>2pc — ${esc(setInfo.p2[0])}:</b> ${esc(setInfo.p2[1])}<br><b>4pc — ${esc(setInfo.p4[0])}:</b> ${esc(setInfo.p4[1])}${setInfo.src?`<br><span class="count">drops: ${esc(setInfo.src)}</span>`:''}</div>`:'<p class="note">Pick a set to hold 2 or 4 of its pieces in the best-set math (only sets you own show here).</p>'}
    </div>
  </div>

  <div class="ecard">
    <h3>Stat goals — drag rows to order, top = most important</h3>
    <div id="statRows">${b.prio.map((k,ix)=>{
      const now=sug?(sug.champion.totals[k]||0):null;
      return `<div class="statrow" draggable="true" data-k="${k}">
        <span class="grip">⠿</span><span class="rank">#${ix+1}</span><span class="sname">${STATN[k]}</span>
        <span class="sctl"><span class="t">min</span><input type="range" min="0" max="200" step="5" value="${b.min[k]||0}" data-rmin="${k}"><input type="number" min="0" max="200" value="${b.min[k]||0}" data-min="${k}"></span>
        <span class="sctl"><span class="t">max</span><input type="range" min="0" max="200" step="5" value="${b.max[k]??200}" data-rmax="${k}"><input type="number" min="0" max="200" value="${b.max[k]??200}" data-max="${k}"></span>
        <span class="nowv">${now!=null?'now '+now:''}</span>
      </div>`;}).join('')}</div>
    <p class="note">The app hunts pieces that push the top stats toward their <b>min</b> targets and treats points past <b>max</b> as wasted. Editing goals re-checks the whole vault — those suggestions go to the feed only, never the panel alert.</p>
  </div>

  <div class="bar">
    <button class="btn" id="saveBtn">Save build</button>
    ${b.id?'<button class="btn red sm" id="delBtn">Delete build</button>':''}
  </div></div>`;
  wireEditor();
}

function wireEditor(){
  const b=edit;
  const keepName=()=>{ b.name=$('bName').value; };
  $('backBtn').onclick=()=>{ edit=null; render(); };
  $('bWatch').onchange=e=>{ b.watch=e.target.checked; };
  $('editSubBtn').onclick=()=>{ keepName(); openSubModal(); };
  $('editExoBtn').onclick=()=>{ keepName(); openExoModal(); };
  document.querySelectorAll('.clstab').forEach(x=>x.onclick=()=>{ keepName(); b.cls=x.dataset.cls; b.classType={Titan:0,Hunter:1,Warlock:2}[b.cls]; b.plugs=blankBuild().plugs; b.exotic={hash:0,slot:''}; renderEditor(); });
  document.querySelectorAll('.eltab').forEach(x=>x.onclick=()=>{ keepName(); b.elem=x.dataset.elem; b.plugs=blankBuild().plugs; renderEditor(); openSubModal(); });
  $('sbName').onchange=e=>{ keepName(); b.setBonus={name:e.target.value,want:e.target.value?(b.setBonus.want||4):0}; renderEditor(); };
  document.querySelectorAll('[data-want]').forEach(x=>x.onclick=()=>{ keepName(); b.setBonus.want=+x.dataset.want; if(b.setBonus.want&&!b.setBonus.name) return; renderEditor(); });
  // sliders + numbers stay in sync (no re-render needed while dragging)
  const sync=(k,v,isMin)=>{ v=Math.max(0,Math.min(200,+v||0)); (isMin?b.min:b.max)[k]=v;
    document.querySelector(`[data-r${isMin?'min':'max'}="${k}"]`).value=v;
    document.querySelector(`[data-${isMin?'min':'max'}="${k}"]`).value=v; };
  document.querySelectorAll('[data-rmin]').forEach(x=>x.oninput=()=>sync(x.dataset.rmin,x.value,true));
  document.querySelectorAll('[data-rmax]').forEach(x=>x.oninput=()=>sync(x.dataset.rmax,x.value,false));
  document.querySelectorAll('[data-min]').forEach(x=>x.onchange=()=>sync(x.dataset.min,x.value,true));
  document.querySelectorAll('[data-max]').forEach(x=>x.onchange=()=>sync(x.dataset.max,x.value,false));
  let dragK=null;
  document.querySelectorAll('.statrow').forEach(row=>{
    row.addEventListener('dragstart',()=>{ dragK=row.dataset.k; row.classList.add('dragging'); });
    row.addEventListener('dragend',()=>row.classList.remove('dragging'));
    row.addEventListener('dragover',e=>e.preventDefault());
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const tgt=row.dataset.k; if(!dragK||dragK===tgt) return;
      const p=b.prio.filter(k=>k!==dragK);
      p.splice(p.indexOf(tgt)+(b.prio.indexOf(dragK)<b.prio.indexOf(tgt)?1:0),0,dragK);
      b.prio=p; keepName(); renderEditor();
    });
  });
  $('saveBtn').onclick=async()=>{
    keepName(); b.name=b.name||'Unnamed build'; b.draft=false;
    const r=await fetch('/api/builds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());
    if(r.ok){ edit=null; await load(); } else alert('Save failed: '+(r.error||'?'));
  };
  const del=$('delBtn'); if(del) del.onclick=async()=>{
    if(!confirm(`Delete build "${b.name}"? This cannot be undone.`))return;
    await fetch('/api/builds/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:b.id})});
    edit=null; load();
  };
}

/* ---------------- modals ---------------- */
function closeModal(){ $('modal').innerHTML=''; renderEditor(); }
function modalShell(title,inner){
  $('modal').innerHTML=`<div class="modal" id="mOuter"><div class="mbox" style="--el:${ELCOL[edit.elem]||'#888'}">
    <h2 class="disp">${title}<button class="mclose" id="mClose">Done ✕</button></h2>${inner}</div></div>`;
  $('mClose').onclick=closeModal;
  $('mOuter').addEventListener('click',e=>{ if(e.target.id==='mOuter') closeModal(); });
}
function pkBtn(x,kind,on,small){
  return `<button class="pk2 ${on?'on':''} ${small?'sm':''}" data-mab="${kind}" data-h="${x.h}" data-pn="${esc(x.n)}">
    <span class="fr"><img src="${BN}${x.icon}" alt="" loading="lazy"></span>
    <span class="nm2">${esc(x.n)}</span>
    ${x.inv?`<span class="statchip">${Object.entries(x.inv).map(([k,v])=>`${v>0?'+':''}${v} ${STATN[k]||k}`).join(' ')}</span>`:''}
  </button>`;
}
function openSubModal(){
  const b=edit, cat=catOf(b), cap=fragCap(b);
  if(b.plugs.fragments.length>cap) b.plugs.fragments=b.plugs.fragments.slice(0,cap);
  const col=ELCOL[b.elem];
  modalShell(`${b.cls} · <span style="color:${col}">${elName(b.elem)}</span> subclass`,`
    <div class="eltabs" style="margin-bottom:4px">${ELEMS.map(([v,t])=>`<button class="eltab ${b.elem===v?'on':''}" style="--elc:${ELCOL[v]}" data-melem="${v}">${t}</button>`).join('')}</div>
    <div class="msec"><h4>Super</h4><div class="pgrid">${cat.supers.map(x=>pkBtn(x,'super',b.plugs.super===x.h)).join('')}</div></div>
    <div class="msec"><h4>Class ability</h4><div class="pgrid">${cat.classAbilities.map(x=>pkBtn(x,'classAbility',b.plugs.classAbility===x.h)).join('')}</div></div>
    <div class="msec"><h4>Movement</h4><div class="pgrid">${cat.movement.map(x=>pkBtn(x,'movement',b.plugs.movement===x.h)).join('')}</div></div>
    <div class="msec"><h4>Melee</h4><div class="pgrid">${cat.melee.map(x=>pkBtn(x,'melee',b.plugs.melee===x.h)).join('')}</div></div>
    <div class="msec"><h4>Grenade</h4><div class="pgrid">${cat.grenades.map(x=>pkBtn(x,'grenade',b.plugs.grenade===x.h)).join('')}</div></div>
    <div class="msec"><h4>Aspects <small>pick 2 — chosen: ${b.plugs.aspects.length}/2 · fragment slots granted: ${cap}</small></h4>
      <div class="pgrid">${cat.aspects.map(x=>pkBtn({...x,inv:null},'aspects',b.plugs.aspects.includes(x.h))).join('')}</div></div>
    <div class="msec"><h4>Fragments <small>chosen: ${b.plugs.fragments.length}/${cap}</small></h4>
      <div class="pgrid">${cat.fragments.map(x=>pkBtn(x,'fragments',b.plugs.fragments.includes(x.h),true)).join('')}</div></div>`);
  document.querySelectorAll('[data-melem]').forEach(x=>x.onclick=()=>{ edit.elem=x.dataset.melem; edit.plugs=blankBuild().plugs; openSubModal(); });
  document.querySelectorAll('[data-mab]').forEach(x=>x.onclick=()=>{
    const kind=x.dataset.mab,h=+x.dataset.h,b=edit;
    if(kind==='aspects'){ const a=b.plugs.aspects; b.plugs.aspects=a.includes(h)?a.filter(v=>v!==h):(a.length<2?[...a,h]:[a[1],h]); }
    else if(kind==='fragments'){ const f=b.plugs.fragments,c=fragCap(b); b.plugs.fragments=f.includes(h)?f.filter(v=>v!==h):(f.length<c?[...f,h]:f); }
    else b.plugs[kind]=b.plugs[kind]===h?0:h;
    openSubModal();
  });
}
function openExoModal(){
  const b=edit, exos=exoPickList().filter(i=>i.cls===b.cls).sort((a,z)=>a.n.localeCompare(z.n));
  // grouped by slot — Helmet / Gauntlets / Chest / Leg / Class Item (Diego 2026-07-13)
  const secs=SLOTS.map(slot=>{
    const list=exos.filter(i=>i.slot===slot);
    if(!list.length) return '';
    return `<div class="msec"><h4 style="color:var(--gold)">${slot} <small>${list.length}</small></h4>
      <div class="xg">${list.map(i=>`<button class="xpick ${b.exotic?.hash===i.hash?'on':''}" data-mexo="${i.hash}" data-slot="${esc(i.slot)}" data-pn="${esc(i.n)}">
        <span class="fr">${i.icon?`<img src="${BN}${i.icon}" alt="" loading="lazy">`:''}</span>
        <span class="nm2">${esc(i.n)}</span><span class="sl">best T${i.t} · ${i.tot} base</span>
      </button>`).join('')}</div></div>`;
  }).join('');
  modalShell(`${b.cls} exotic armor — choose the anchor`, secs||'<p class="note">No exotics of this class in the vault.</p>');
  document.querySelectorAll('[data-mexo]').forEach(x=>x.onclick=()=>{ edit.exotic={hash:+x.dataset.mexo,slot:x.dataset.slot,n:x.dataset.pn||''}; closeModal(); });
}

/* ---------------- top-level events ---------------- */
document.body.addEventListener('click',async e=>{
  const t=e.target.closest('[data-edit],[data-sug],[data-ack]');
  if(!t)return;
  if(t.dataset.edit){ edit=JSON.parse(JSON.stringify(BUILDS.find(b=>b.id===t.dataset.edit))); render(); window.scrollTo(0,0); }
  else if(t.dataset.sug){ const id=t.dataset.sug; openSug.has(id)?openSug.delete(id):openSug.add(id); render(); }
  else if(t.dataset.ack){ await fetch('/api/builds/alerts/ack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buildId:t.dataset.ack})}); render(); }
});
$('newBtn').onclick=()=>{ edit=blankBuild(); render(); window.scrollTo(0,0); };
$('importBtn').onclick=async()=>{
  $('importBtn').disabled=true; $('importBtn').textContent='Importing…';
  try{
    const r=await fetch('/api/builds/import-dim',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json());
    if(r.error) alert('Import failed: '+r.error);
    else alert(`Imported ${r.imported.length} DIM loadout${r.imported.length===1?'':'s'} as drafts${r.skipped.length?` · skipped ${r.skipped.length}`:''}. Open a draft, set stat goals, and save.`);
    await load();
  }catch(err){ alert('Import failed: '+err.message); }
  $('importBtn').disabled=false; $('importBtn').textContent='Import DIM loadouts';
};
$('delDraftsBtn').onclick=async()=>{
  const n=BUILDS.filter(b=>b.draft&&b.src==='dim').length;
  if(!n){ alert('No DIM drafts to delete.'); return; }
  if(!confirm(`Delete all ${n} unfinished DIM drafts? Builds you saved (no draft chip) are kept.`))return;
  const r=await fetch('/api/builds/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({drafts:true})}).then(r=>r.json());
  alert(`Deleted ${r.deleted} drafts.`); load();
};
load();
</script>
