<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion — Loadouts</title>
<style>
:root{
  --bg:#0c0e12; --panel:#151821; --panel2:#1b1f2b; --line:#2a2f3d;
  --ink:#e9ebf2; --mut:#8b93a7; --dim:#5c6375; --gold:#cfae42; --keep:#5fd0dd; --junk:#ff6a52;
  --clip:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.45 "Segoe UI",Roboto,system-ui,sans-serif;padding:12px;padding-bottom:40px}
.disp{font-family:Bahnschrift,"Roboto Condensed","Arial Narrow",sans-serif;text-transform:uppercase;letter-spacing:.09em}
h1{font-size:22px;font-weight:600}
h1 span{color:var(--gold)}
h2{font-size:15px}
.sub{color:var(--mut);font-size:12px;margin:2px 0 10px}
.nav{display:flex;gap:6px;margin:6px 0 4px;flex-wrap:wrap}
.nav a{font-family:Bahnschrift,"Roboto Condensed","Arial Narrow",sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:12px;text-decoration:none;color:var(--mut);border:1px solid var(--line);padding:5px 12px;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.nav a.on{color:var(--gold);border-color:var(--gold);background:rgba(207,174,66,.12)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.btn{background:var(--panel2);border:1px solid var(--gold);color:var(--gold);padding:8px 13px;font-size:12px;cursor:pointer;clip-path:var(--clip);font-family:inherit}
.btn:active{background:var(--gold);color:#000}
.btn.sm{padding:5px 10px;font-size:11px}
.btn.mut{border-color:var(--line);color:var(--mut)}
.btn.red{border-color:var(--junk);color:var(--junk)}
.count{color:var(--mut);font-size:12px}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);clip-path:var(--clip);padding:12px;margin-bottom:12px}
.chead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.chead .cls{font-weight:600;color:var(--gold);font-size:16px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.slot{background:var(--panel2);border:1px solid var(--line);clip-path:var(--clip);padding:8px}
.slot .sn{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-family:Bahnschrift,"Roboto Condensed",sans-serif}
.cos{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);margin-top:4px;min-width:0}
.cos img{width:26px;height:26px;flex-shrink:0;border:1px solid var(--line);background:#000}
.cos span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.look .slots{grid-template-columns:repeat(5,1fr)}
.look .mini{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--line);clip-path:var(--clip);padding:6px 4px}
.look .mini .sn{margin:0 0 2px}
.look .mini img{width:30px;height:30px;border:1px solid var(--line);background:#000}
.res{margin-top:8px;font-size:11px}
.res .ok{color:var(--keep)} .res .bad{color:var(--junk)}
.warn{background:rgba(255,106,82,.12);border:1px solid var(--junk);color:var(--junk);padding:8px 10px;font-size:12px;clip-path:var(--clip);margin-top:8px}
.note{color:var(--dim);font-size:12px}
.big{text-align:center;color:var(--mut);padding:30px 12px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(min-width:760px){body{max-width:1000px;margin:0 auto}}
</style>
</head>
<body>
<h1 class="disp">Fashion <span>Loadouts</span></h1>
<nav class="nav"><a href="/">Vault Verdict</a><a href="/weapons">Weapon Watch</a><a href="/drops">New Drops</a><a href="/fashion" class="on">Fashion</a></nav>
<p class="sub">Save your equipped ornament + shader looks and re-apply them in one click. <b>Apply works only while your character is in orbit.</b></p>
<div class="bar"><button class="btn" id="refreshBtn">Refresh</button><span class="count" id="status"></span></div>

<h2 class="disp">Currently equipped</h2>
<div id="current"></div>

<h2 class="disp" style="margin-top:16px">Saved looks</h2>
<div id="looks"></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const BN='https://www.bungie.net';
let FASH={characters:{},order:[]}, LOOKS=[];

const img=(ic,alt)=>ic?`<img src="${BN}${ic}" alt="${esc(alt||'')}" title="${esc(alt||'')}">`:'';

function renderCurrent(){
  const cs=Object.entries(FASH.characters||{});
  if(!cs.length){ $('current').innerHTML='<div class="big note">No characters loaded.</div>'; return; }
  $('current').innerHTML=cs.map(([cid,ch])=>{
    const slots=(FASH.order||[]).map(sl=>{
      const s=ch.slots[sl]; if(!s) return `<div class="slot"><div class="sn">${sl}</div><div class="note">—</div></div>`;
      return `<div class="slot"><div class="sn">${sl}</div>
        <div class="cos">${img(s.orn&&s.orn.icon,s.orn&&s.orn.name)}<span>${s.orn?esc(s.orn.name||'Default'):'—'}</span></div>
        <div class="cos">${img(s.shd&&s.shd.icon,s.shd&&s.shd.name)}<span>${s.shd?esc(s.shd.name):'—'}</span></div>
      </div>`;
    }).join('');
    return `<div class="card"><div class="chead"><span class="cls">${esc(ch.cls)}</span>
      <button class="btn sm" data-save="${cid}">Save this look</button></div>
      <div class="slots">${slots}</div></div>`;
  }).join('');
}

function renderLooks(){
  if(!LOOKS.length){ $('looks').innerHTML='<div class="big note">No saved looks yet — hit “Save this look” above.</div>'; return; }
  $('looks').innerHTML=LOOKS.map((lk,i)=>{
    const minis=(FASH.order||['Helmet','Gauntlets','Chest','Legs','Class']).map(sl=>{
      const w=(lk.slots||{})[sl]||{};
      return `<div class="mini"><div class="sn">${sl}</div>${img(w.ornIcon,w.ornName)}${img(w.shdIcon,w.shdName)}</div>`;
    }).join('');
    // target: a currently-loaded character matching this look's class
    const target=Object.entries(FASH.characters||{}).find(([id,c])=>c.cls===lk.cls);
    const applyBtn=target?`<button class="btn sm" data-apply="${i}" data-cid="${target[0]}">Apply to ${esc(lk.cls)}</button>`
      :`<span class="note">no ${esc(lk.cls)} loaded</span>`;
    return `<div class="card look"><div class="chead"><span class="cls">${esc(lk.name)} <span class="note">· ${esc(lk.cls)}</span></span>
      <span>${applyBtn} <button class="btn sm red" data-del="${i}">Delete</button></span></div>
      <div class="slots">${minis}</div><div class="res" id="res${i}"></div></div>`;
  }).join('');
}

function currentToLook(cid,name){
  const ch=FASH.characters[cid]; const slots={};
  for(const [sl,s] of Object.entries(ch.slots)){
    slots[sl]={};
    if(s.orn){ slots[sl].orn=s.orn.hash; slots[sl].ornName=s.orn.name; slots[sl].ornIcon=s.orn.icon; }
    if(s.shd){ slots[sl].shd=s.shd.hash; slots[sl].shdName=s.shd.name; slots[sl].shdIcon=s.shd.icon; }
  }
  return {name,cls:ch.cls,slots};
}
const saveLooks=()=>fetch('/api/looks',{method:'POST',body:JSON.stringify(LOOKS)});

document.body.addEventListener('click',async e=>{
  const t=e.target.closest('[data-save],[data-apply],[data-del]'); if(!t) return;
  if(t.dataset.save){
    const name=prompt('Name this look:'); if(!name) return;
    LOOKS.push(currentToLook(t.dataset.save,name.trim())); await saveLooks(); renderLooks();
  } else if(t.dataset.del){
    if(!confirm('Delete this saved look?')) return;
    LOOKS.splice(+t.dataset.del,1); await saveLooks(); renderLooks();
  } else if(t.dataset.apply){
    const i=+t.dataset.apply, cid=t.dataset.cid, res=$('res'+i);
    t.disabled=true; res.innerHTML='<span class="note">Applying… (must be in orbit)</span>';
    const r=await fetch('/api/fashion/apply',{method:'POST',body:JSON.stringify({characterId:cid,look:LOOKS[i]})}).then(r=>r.json()).catch(()=>({error:'network'}));
    t.disabled=false;
    if(r.error){ res.innerHTML=`<div class="warn">${esc(r.error)}</div>`; return; }
    const orbit=r.results.some(x=>/Tower|orbit/i.test(x.msg||''));
    const lines=r.results.map(x=>`<div class="${x.ok?'ok':'bad'}">${x.ok?'✓':'✗'} ${x.slot}${x.kind?' '+(x.kind==='orn'?'ornament':'shader'):''}${x.msg?' — '+esc(x.msg):''}</div>`).join('');
    res.innerHTML=(orbit?'<div class="warn">You must be in orbit (not in an activity) to change fashion. Go to orbit and try again.</div>':'')+lines;
    load(); // refresh current to reflect changes
  }
});
$('refreshBtn').onclick=()=>load();

async function load(){
  $('status').textContent='Loading…';
  try{
    const [f,l]=await Promise.all([fetch('/api/fashion').then(r=>r.json()),fetch('/api/looks').then(r=>r.json())]);
    if(f.error) throw new Error(f.error);
    FASH=f; LOOKS=Array.isArray(l)?l:[];
    $('status').textContent=`${Object.keys(FASH.characters||{}).length} characters · ${LOOKS.length} saved look${LOOKS.length===1?'':'s'}`;
    renderCurrent(); renderLooks();
  }catch(err){ $('status').textContent='Error: '+err.message; }
}
load();
</script>
</body>
</html>
