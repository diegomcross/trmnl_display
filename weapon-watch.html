<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapon Watch — God-Roll Tracker</title>
<style>
:root{
  --bg:#0c0e12; --panel:#151821; --panel2:#1b1f2b; --line:#2a2f3d;
  --ink:#e9ebf2; --mut:#8b93a7; --dim:#5c6375;
  --gold:#cfae42; --purp:#a97fd6; --keep:#5fd0dd; --rev:#e8b64c; --junk:#ff6a52;
  --clip:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font:15px/1.45 "Segoe UI",Roboto,system-ui,sans-serif;padding:12px;padding-bottom:40px}
.disp{font-family:Bahnschrift,"Roboto Condensed","Arial Narrow",sans-serif;text-transform:uppercase;letter-spacing:.09em}
h1{font-size:22px;font-weight:600}
h1 span{color:var(--gold)}
.sub{color:var(--mut);font-size:12px;margin:2px 0 12px}
.sub a{color:var(--keep);text-decoration:none}
.nav{display:flex;gap:6px;margin:6px 0 4px}
.nav a{font-family:Bahnschrift,"Roboto Condensed","Arial Narrow",sans-serif;text-transform:uppercase;letter-spacing:.06em;font-size:12px;text-decoration:none;color:var(--mut);border:1px solid var(--line);padding:5px 12px;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.nav a.on{color:var(--gold);border-color:var(--gold);background:rgba(207,174,66,.12)}
.bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.btn{background:var(--panel2);border:1px solid var(--gold);color:var(--gold);padding:8px 13px;font-size:12px;cursor:pointer;clip-path:var(--clip);font-family:inherit}
.btn:active{background:var(--gold);color:#000}
.btn.sm{padding:4px 9px;font-size:10.5px}
.btn.red{border-color:var(--junk);color:var(--junk)}
.btn.mut{border-color:var(--line);color:var(--mut)}
input[type=search],select{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 10px;font-size:13px;clip-path:var(--clip);appearance:none}
select.sm{padding:3px 6px;font-size:11px}
input[type=search]{flex:1;min-width:160px}
input[type=checkbox]{accent-color:var(--gold);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.panel{background:var(--panel);border:1px solid var(--line);clip-path:var(--clip);padding:12px;margin-bottom:14px}
.panel h2{font-size:13px;color:var(--mut);margin-bottom:8px}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);clip-path:var(--clip);margin-bottom:8px}
.whead{display:flex;justify-content:space-between;gap:8px;align-items:center;cursor:pointer;padding:10px 12px}
.whead .nm{font-weight:600;font-size:15px;color:var(--gold)}
.whead .sum{color:var(--mut);font-size:11.5px}
.wbody{padding:0 12px 10px;border-top:1px dashed var(--line)}
.meta{color:var(--mut);font-size:11.5px;margin:6px 0}
.meta b{color:var(--ink)}
.trk{margin:6px 0;padding:8px 10px;background:var(--panel2);clip-path:var(--clip)}
.trk .thd{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-family:Bahnschrift,"Roboto Condensed",sans-serif;margin-bottom:2px}
.colh{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px;font-family:Bahnschrift,"Roboto Condensed",sans-serif}
.pool{display:flex;gap:4px;flex-wrap:wrap}
.pk{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:5px 9px;font-size:11px;cursor:pointer;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);font-family:inherit}
.pk.t1{background:rgba(95,208,221,.15);color:var(--keep);border-color:var(--keep)}
.pk.t2{background:rgba(207,174,66,.22);color:var(--gold);border-color:var(--gold);font-weight:600}
.pk.t2::before{content:"★ "}
.tools{display:flex;gap:5px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);padding:7px 0;font-size:11px;color:var(--dim)}
.copy{display:grid;grid-template-columns:82px minmax(0,1fr) minmax(155px,auto);gap:16px;border-top:1px dashed var(--line);padding:10px 0;font-size:12px;align-items:start}
.copy .cA{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.copy .cB{min-width:0}
.copy .cC{display:flex;flex-direction:column;gap:7px;align-items:flex-end;text-align:right}
.copy .rollline{line-height:1.5}
.copy .statline{margin-top:4px}
.copy .cp{color:var(--mut)}
.copy .hit{color:var(--keep)}
.copy .hi{color:var(--gold);font-weight:600}
.copy .act{text-decoration:underline}
.frac{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:5px 9px;font-size:10.5px;cursor:pointer;clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.chip.on.keep{border-color:var(--keep);color:var(--keep);background:rgba(95,208,221,.14)}
.chip.on.favorite{border-color:var(--gold);color:var(--gold);background:rgba(207,174,66,.16)}
.chip.on.junk{border-color:var(--junk);color:var(--junk);background:rgba(255,106,82,.14)}
.copy .loc{font-size:10.5px;color:var(--mut);line-height:1.55}
.copy .loc b{color:var(--ink)}
.copy .acts{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.lockb.mv{font-size:11px;padding:4px 10px}
.score{font-size:14px;font-weight:700;padding:3px 9px;clip-path:var(--clip);background:var(--panel2);color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap;display:inline-block}
.score.hot{background:rgba(207,174,66,.2);color:var(--gold);font-weight:700}
.lockb{background:none;border:1px solid var(--line);color:var(--mut);cursor:pointer;font-size:13px;padding:2px 7px;clip-path:var(--clip)}
.lockb.on{border-color:var(--gold);color:var(--gold)}
.tagv{font-size:10.5px;color:var(--purp)}
.st{background:var(--panel2);padding:2px 7px;font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums;clip-path:var(--clip);display:inline-block;margin:2px 2px 0 0}
.st b{font-weight:600;color:var(--ink)}
.st.s1 b{color:var(--gold)} .st.s1{outline:1px solid var(--gold);outline-offset:-1px}
.st.s2 b{color:var(--keep)} .st.s2{outline:1px solid var(--keep);outline-offset:-1px}
.st.s3 b{color:var(--junk)} .st.s3{outline:1px solid var(--junk);outline-offset:-1px}
.row{display:flex;justify-content:space-between;gap:8px;align-items:center;border-top:1px solid var(--line);padding:8px 0}
.row .rn{font-weight:600;font-size:13px}
.row .ri{color:var(--mut);font-size:11px}
.count{color:var(--mut);font-size:12px;margin:8px 0}
.note{font-size:10.5px;color:var(--dim);margin-top:6px}
.tab{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:6px 11px;cursor:pointer;font-size:11px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);font-family:inherit;text-transform:uppercase;letter-spacing:.05em}
.tab.on{color:var(--ink);border-color:var(--gold);background:rgba(207,174,66,.15)}
.tgl{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--mut);cursor:pointer;user-select:none}
.tgl input{accent-color:var(--gold);width:14px;height:14px}
.badge{background:rgba(207,174,66,.25);color:var(--gold);font-weight:700;font-size:10.5px;padding:2px 8px;clip-path:var(--clip);margin-left:4px;white-space:nowrap}
.hperks{color:var(--dim);font-size:11px;margin-top:2px}
.hperks b{color:var(--keep);font-weight:400}
.hperks .hp2{color:var(--gold)}
.hperks{overflow:hidden;text-overflow:ellipsis}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(min-width:760px){body{max-width:880px;margin:0 auto}}
@media(max-width:520px){
  .copy{grid-template-columns:1fr;gap:9px}
  .copy .cC{align-items:flex-start;text-align:left}
  .copy .acts{justify-content:flex-start}
  .tools{gap:4px}
  .pk,.chip{padding:7px 11px}   /* bigger tap targets on phone */
}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<h1 class="disp">Weapon <span>Watch</span></h1>
<nav class="nav"><a href="/">Vault Verdict</a><a href="/weapons" class="on">Weapon Watch</a><a href="/drops">New Drops</a><a href="/fashion">Fashion</a></nav>
<p class="sub">God-roll tracker · tap a card to expand</p>
<div class="bar"><button class="btn" id="refreshBtn">Refresh from Bungie</button><span class="count" id="status" style="margin:0"></span></div>

<div class="bar" id="wBar">
  <select id="wSort"><option value="score">Sort: best match %</option><option value="name">Sort: name</option></select>
  <div class="bar" id="wAmmoTabs" style="margin:0"></div>
  <label class="tgl"><input type="checkbox" id="wOnlyHits"> Only show weapons with a hit</label>
  <button class="btn sm mut" id="selModeBtn">Select multiple</button>
  <button class="btn sm mut" id="expJunkBtn">Copy junk DIM query</button>
  <span class="count" id="wCount" style="margin:0"></span>
</div>

<div id="watched"></div>

<div class="panel">
  <h2 class="disp">Add weapons to the watchlist</h2>
  <div class="bar"><input type="search" id="q" placeholder="Search weapon name / type…"></div>
  <div id="allList"></div>
</div>

<script>
let DATA={weapons:[],defs:{}}, WATCH={}, TAGS={}, q='', wSort='score', wAmmo='', wOnlyHits=false, selMode=false;
const openCards=new Set(), sel=new Set();
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

// God-roll gate (tunable). A drop is a "god roll" only when it clears ALL three:
// enough of your wishlist by weight, enough criteria matched in absolute terms, and
// a wishlist rich enough to be meaningful. This is what stops a 1-perk pick (1/1 =
// 100%) from flagging every drop, while a 6-perk + stat + MW wishlist hitting 5–6/8
// qualifies. These same thresholds will drive the future TRMNL drop alert.
const GOD_MIN_PCT=75;       // matched weight must be ≥ this % of selected weight
const GOD_MIN_MATCHES=3;    // and at least this many selected criteria must match
const GOD_MIN_SELECTED=4;   // and you must be tracking at least this many criteria

// Weighted %-match of everything you selected: perks (normal 1 / ★ high 2), the
// wanted masterwork (1), and each watched stat (1, "met" = this copy is the best
// among your copies for that stat — the gold rank). Perks match by NAME so enhanced
// variants count. rankOf comes from the copies set (see renderWatched).
function scoreCopy(w,cfg,rankOf){
  const perks=cfg.perks||{}, roll=new Set([...w.cols[0],...w.cols[1]].map(p=>p.n));
  let selW=0,matchW=0,matched=0,selN=0;
  for(const [n,pr] of Object.entries(perks)){ selW+=pr; selN++; if(roll.has(n)){ matchW+=pr; matched++; } }
  if(cfg.mw){ selW+=1; selN++; if(w.mw===cfg.mw){ matchW+=1; matched++; } }
  for(const s of (cfg.stats||[])){ selW+=1; selN++; if(rankOf?.[s] && rankOf[s](w.statsMax[s]??-1)==='s1'){ matchW+=1; matched++; } }
  const pct=selW?Math.round(100*matchW/selW):0;
  const god=selN>=GOD_MIN_SELECTED && matched>=GOD_MIN_MATCHES && pct>=GOD_MIN_PCT;
  return {pct,matchW,selW,matched,selN,god};
}
const trackedCount=cfg=>Object.keys(cfg.perks||{}).length;
const selectedCount=cfg=>trackedCount(cfg)+(cfg.mw?1:0)+((cfg.stats||[]).length);
const tagOf=w=>TAGS[w.id]!==undefined?TAGS[w.id]:(w.tag||'none');   // local overlay wins, then DIM, then none
function copyText(text,btn,msg){
  const done=()=>{const old=btn.textContent;btn.textContent=msg;setTimeout(()=>btn.textContent=old,1600);};
  const fb=()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();done();};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done,fb);}else fb();
}

const MWS=['range','stability','handling','reload','accuracy','blast_radius','velocity','impact','draw_time','charge_time','projectile_speed'];
const STAT_PICK=['Range','Stability','Handling','Reload Speed','Aim Assistance','Airborne Effectiveness','Zoom','Recoil Direction','Magazine','Blast Radius','Velocity','Impact','Accuracy','Charge Time','Draw Time'];
const TAG_OPTS=['none','keep','favorite','junk'];
const copiesByHash=()=>{const m={};DATA.weapons.forEach(w=>{(m[w.hash]=m[w.hash]||[]).push(w);});return m;};
// tracked perk names for the collapsed header, high-priority (★) first
const trackedNames=cfg=>Object.entries(cfg.perks||{}).sort((a,b)=>b[1]-a[1]).map(([n,pr])=>({n,hi:pr===2}));

function render(){ renderWatched(); renderAdd(); }

// Re-render the watched list while keeping the card you're editing visually fixed.
// Selecting a perk/stat changes that weapon's best %, which can re-sort the list and
// move the card — anchoring to the card's on-screen position stops the page from jumping.
function renderKeepingAnchor(hash){
  const sel=`[data-open="${hash}"]`;
  const el=document.querySelector(sel);
  const before=el?el.getBoundingClientRect().top:null;
  renderWatched();
  const el2=document.querySelector(sel);
  if(before!=null && el2) window.scrollBy(0, el2.getBoundingClientRect().top - before);
}

function renderWatched(){
  const y=window.scrollY;                         // preserve scroll across full rebuild
  const copiesOf=copiesByHash();

  $('wAmmoTabs').innerHTML=['','Kinetic','Energy','Power'].map(x=>
    `<button class="tab ${wAmmo===x?'on':''}" data-wammo="${x}">${x||'All ammo'}</button>`).join('');

  let entries=Object.entries(WATCH).map(([hash,cfg])=>{
    const d=DATA.defs[hash];
    const raw=copiesOf[hash]||[];
    // rank each watched stat across this weapon's copies first (score needs it)
    const rankOf={};
    for(const s of (cfg.stats||[])){
      const vals=[...new Set(raw.map(w=>w.statsMax[s]??-1))].sort((a,b)=>b-a);
      rankOf[s]=v=>{const i=vals.indexOf(v);return i===0?'s1':i===1?'s2':i===2?'s3':'';};
    }
    const copies=raw.map(w=>({w,sc:scoreCopy(w,cfg,rankOf)})).sort((a,b)=>b.sc.pct-a.sc.pct||b.sc.matchW-a.sc.matchW);
    return {hash,cfg,d,rankOf,copies,best:copies[0]?.sc.pct??0,hasGod:copies.some(c=>c.sc.god)};
  });
  const totalWatched=entries.length;
  entries=entries.filter(en=>en.d && (!wAmmo||en.d.slot===wAmmo) && (!wOnlyHits||en.best>0));
  entries.sort((a,b)=> wSort==='score' ? (b.best-a.best || a.d.n.localeCompare(b.d.n)) : a.d.n.localeCompare(b.d.n));
  $('wCount').textContent=totalWatched?`showing ${entries.length} of ${totalWatched}`:'';
  $('selModeBtn').classList.toggle('on',selMode);
  $('selModeBtn').textContent=selMode?'Done selecting':'Select multiple';
  $('selModeBtn').style.borderColor=selMode?'var(--gold)':'';
  $('selModeBtn').style.color=selMode?'var(--gold)':'';

  $('watched').innerHTML=(entries.length?entries.map(({hash,cfg,d,rankOf,copies,best,hasGod})=>{
    const isOpen=openCards.has(hash);
    const tn=trackedNames(cfg);
    const hperks=tn.length?`<div class="hperks">${tn.map(p=>`<${p.hi?'b class="hp2"':'b'}>${p.hi?'★':''}${esc(p.n)}</b>`).join(' · ')}</div>`:'';
    const vtag=d.versions>1?` <span style="color:var(--dim)">· ${d.versions} versions</span>`:'';
    const head=`<div class="whead" data-open="${hash}">
      <span><span class="nm">${esc(d.n)}</span> <span class="sum">· ${esc(d.ty)} · ${copies.length} cop${copies.length===1?'y':'ies'} · best ${best}%${vtag} · tracking ${selectedCount(cfg)} criteria</span>${hasGod?'<span class="badge">🎯 GOD ROLL</span>':''}${isOpen?'':hperks}</span>
      <span class="sum">${isOpen?'▾':'▸'}</span></div>`;
    if(!isOpen) return `<div class="card">${head}</div>`;

    const mwOpts=[...new Set([...MWS,...copies.map(c=>c.w.mw).filter(Boolean)])];
    const poolBtns=ci=>(d.pool[ci]||[]).map(n=>{
      const pr=(cfg.perks||{})[n]||0;
      return `<button class="pk ${pr===1?'t1':pr===2?'t2':''}" data-w="${hash}" data-p="${esc(n)}">${esc(n)}</button>`;
    }).join('')||'<span class="note">no random perks in this column</span>';
    const statBtns=STAT_PICK.map(s=>{
      const on=(cfg.stats||[]).includes(s);
      return `<button class="pk ${on?'t1':''}" data-w="${hash}" data-st="${esc(s)}">${esc(s)}</button>`;
    }).join('');

    const copyRows=copies.map(({w,sc})=>{
      const col=ci=>w.cols[ci].map(p=>{
        const pr=(cfg.perks||{})[p.n]||0;
        return `<span class="${pr===2?'hi':pr===1?'hit':'cp'} ${p.on?'act':''}">${esc(p.n)}</span>`;
      }).join(' · ')||'—';
      const stats=(cfg.stats||[]).map(s=>{
        const v=w.statsMax[s];
        return `<span class="st ${v!==undefined?rankOf[s](v):''}">${esc(s)} <b>${v??'—'}</b></span>`;
      }).join('');
      const tag=tagOf(w);
      const chips=['keep','favorite','junk'].map(t=>
        `<button class="chip ${tag===t?'on '+t:''}" data-ctag="${w.id}" data-t="${t}" title="Tag ${t}${tag===t?' — tap again to clear':''}">${t==='favorite'?'fav':t}</button>`).join('');
      const inVault=w.own==='Vault';
      const moveBtn=inVault
        ? `<button class="lockb mv" data-equip="${w.id}" data-rhash="${w.rhash}" data-own="${esc(w.own)}" title="Pull to your character and equip">Equip</button>`
        : `<button class="lockb mv" data-vault="${w.id}" data-rhash="${w.rhash}" data-own="${esc(w.own)}" title="Send this copy to the vault">→ Vault</button>`;
      return `<div class="copy">
        <div class="cA">
          <span class="score ${sc.god?'hot':''}" title="${sc.matched}/${sc.selN} criteria matched, weighted">${sc.pct}%</span>
          ${sc.selN?`<span class="frac">${sc.matched}/${sc.selN}${sc.god?' 🎯':''}</span>`:''}
          <div class="chips">${chips}</div>
        </div>
        <div class="cB">
          <div class="rollline"><b>3:</b> ${col(0)}</div>
          <div class="rollline"><b>4:</b> ${col(1)}</div>
          ${stats?`<div class="statline">${stats}</div>`:''}
        </div>
        <div class="cC">
          <div class="loc">${inVault?'Vault':'on <b>'+esc(w.own)+'</b>'} · ${w.pwr}<br>MW <span class="${cfg.mw&&w.mw===cfg.mw?'hi':'cp'}">${w.mw||'—'}</span> · DIM ${w.tag||'none'}</div>
          <div class="acts">
            ${selMode?`<input type="checkbox" data-sel="${w.id}" ${sel.has(w.id)?'checked':''}>`:''}
            <button class="lockb ${w.locked?'on':''}" data-lock="${w.id}" data-to="${w.locked?0:1}" title="${w.locked?'Unlock':'Lock'}">${w.locked?'🔒':'🔓'}</button>
            ${moveBtn}
          </div>
        </div></div>`;
    }).join('');

    return `<div class="card">${head}<div class="wbody">
      <div class="meta">${esc(d.ty)} · ${d.slot} · ${d.ammo} · ${d.dmg}${d.src?` · <b>${esc(d.src)}</b>`:''}
        <button class="btn sm red" style="float:right" data-unwatch="${hash}">Unwatch</button></div>
      <div class="trk">
        <div class="thd">Track perks — tap: track → ★ high → off (${trackedCount(cfg)}/6)</div>
        <div class="colh">Column 3</div><div class="pool">${poolBtns(0)}</div>
        <div class="colh">Column 4</div><div class="pool">${poolBtns(1)}</div>
        <div class="colh">Wanted masterwork</div>
        <select data-mw="${hash}"><option value="">any</option>${mwOpts.map(s=>`<option ${cfg.mw===s?'selected':''}>${s}</option>`).join('')}</select>
        <div class="colh">Watched stats — highest possible on each roll (barrel/mag included)</div><div class="pool">${statBtns}</div>
      </div>
      ${selMode?`<div class="tools">
        <button class="btn sm mut" data-selall="${hash}">Select all</button>
        <button class="btn sm mut" data-selnone="${hash}">Clear</button>
        <span>tag selected:</span>
        ${TAG_OPTS.map(t=>`<button class="btn sm ${t==='junk'?'red':'mut'}" data-btag="${hash}" data-t="${t}">${t}</button>`).join('')}
        <button class="btn sm mut" data-block="${hash}" data-to="1">🔒 selected</button>
        <button class="btn sm mut" data-block="${hash}" data-to="0">🔓 selected</button>
        <button class="btn sm red" data-junkrest="${hash}">Junk all unselected</button>
      </div>`:''}
      ${copyRows||'<p class="note">No copies in the vault right now — new drops will be scored against this.</p>'}
    </div></div>`;
  }).join('') : (Object.keys(WATCH).length?'<p class="count">No watched weapons match this filter.</p>':'<p class="count">Nothing watched yet — add weapons below.</p>'));

  window.scrollTo(0,y);   // hold scroll so perk/stat/tag toggles don't jump the page
}

function renderAdd(){
  const copiesOf=copiesByHash();
  const ql=q.toLowerCase();
  const rows=Object.entries(DATA.defs)
    .filter(([h,d])=>!WATCH[h]&&(!ql||d.n.toLowerCase().includes(ql)||d.ty.toLowerCase().includes(ql)))
    .sort((a,b)=>a[1].n.localeCompare(b[1].n));
  $('allList').innerHTML=rows.slice(0,ql?200:30).map(([h,d])=>`<div class="row">
    <div><div class="rn">${esc(d.n)}</div><div class="ri">${esc(d.ty)} · ${d.slot} · ${d.ammo} · ${d.dmg} · ${(copiesOf[h]||[]).length} in vault${d.src?` · ${esc(d.src)}`:''}</div></div>
    <button class="btn sm" data-watch="${h}">Watch</button></div>`).join('')
    +(rows.length>(ql?200:30)?`<p class="count">…${rows.length-(ql?200:30)} more — refine the search.</p>`:'');
}

const save=()=>fetch('/api/watch',{method:'POST',body:JSON.stringify(WATCH)});
const saveTags=()=>fetch('/api/tags',{method:'POST',body:JSON.stringify(TAGS)});
// Two-way DIM sync: each tag change writes straight to DIM's cloud (one item at a
// time — no whole-file overwrite). Local TAGS is updated optimistically first.
async function writeTag(id,tag){
  const r=await fetch('/api/tag',{method:'POST',body:JSON.stringify({id,tag})}).then(r=>r.json()).catch(()=>({error:'network'}));
  if(r&&r.error) $('status').textContent='DIM tag failed: '+r.error;
}
async function setLock(id,to){
  const r=await fetch('/api/lock',{method:'POST',body:JSON.stringify({id,locked:!!to})}).then(r=>r.json());
  if(r.error){ $('status').textContent='Lock failed: '+r.error; return false; }
  const w=DATA.weapons.find(x=>x.id===id); if(w) w.locked=!!to;
  return true;
}
async function itemAction(url,id,rhash,own){
  const r=await fetch(url,{method:'POST',body:JSON.stringify({id,hash:rhash,own})}).then(r=>r.json());
  if(r.error){ $('status').textContent='Action failed: '+r.error; return false; }
  const w=DATA.weapons.find(x=>x.id===id); if(w&&r.own) w.own=r.own;
  return true;
}
const copyIds=hash=>DATA.weapons.filter(w=>w.hash===Number(hash)||String(w.hash)===hash).map(w=>w.id);

document.body.addEventListener('click',async e=>{
  // native controls (tag/mw selects, checkboxes) are handled by the change listener
  if(e.target.closest('select,input[type=checkbox]')) return;
  const t=e.target.closest('[data-open],[data-watch],[data-unwatch],[data-lock],[data-equip],[data-vault],[data-ctag],[data-selall],[data-selnone],[data-btag],[data-block],[data-junkrest],[data-wammo],.pk');
  if(!t) return;
  if(t.dataset.wammo!==undefined){ wAmmo=t.dataset.wammo; renderWatched(); }
  else if(t.dataset.open){ openCards.has(t.dataset.open)?openCards.delete(t.dataset.open):openCards.add(t.dataset.open); renderWatched(); }
  else if(t.dataset.watch){ const h=t.dataset.watch; WATCH[h]={name:DATA.defs[h].n,perks:{},mw:'',stats:[]}; openCards.add(h); save(); render(); }
  else if(t.dataset.unwatch){ if(confirm('Stop watching '+DATA.defs[t.dataset.unwatch].n+'?')){ delete WATCH[t.dataset.unwatch]; save(); render(); } }
  else if(t.dataset.lock){ t.disabled=true; if(await setLock(t.dataset.lock,+t.dataset.to)) renderWatched(); else t.disabled=false; }
  else if(t.dataset.equip){ t.disabled=true; t.textContent='…'; if(await itemAction('/api/equip',t.dataset.equip,t.dataset.rhash,t.dataset.own)) renderWatched(); else { t.disabled=false; t.textContent='Equip'; } }
  else if(t.dataset.vault){ t.disabled=true; t.textContent='…'; if(await itemAction('/api/vault',t.dataset.vault,t.dataset.rhash,t.dataset.own)) renderWatched(); else { t.disabled=false; t.textContent='→ Vault'; } }
  else if(t.dataset.ctag){ // direct per-copy tag chip: tap to set, tap active to clear
    const id=t.dataset.ctag, w=DATA.weapons.find(x=>x.id===id);
    const cur=TAGS[id]!==undefined?TAGS[id]:((w&&w.tag)||'none');
    const nt=(cur===t.dataset.t)?'none':t.dataset.t; TAGS[id]=nt; writeTag(id,nt); renderWatched();
  }
  else if(t.dataset.selall){ copyIds(t.dataset.selall).forEach(id=>sel.add(id)); renderWatched(); }
  else if(t.dataset.selnone){ copyIds(t.dataset.selnone).forEach(id=>sel.delete(id)); renderWatched(); }
  else if(t.dataset.btag){ for(const id of copyIds(t.dataset.btag)) if(sel.has(id)){ TAGS[id]=t.dataset.t; writeTag(id,t.dataset.t); } renderWatched(); }
  else if(t.dataset.block){ t.disabled=true; for(const id of copyIds(t.dataset.block)) if(sel.has(id)) await setLock(id,+t.dataset.to); renderWatched(); }
  else if(t.dataset.junkrest){
    const ids=copyIds(t.dataset.junkrest).filter(id=>!sel.has(id));
    if(!ids.length||!confirm(`Tag ${ids.length} unselected cop${ids.length===1?'y':'ies'} as junk?`)) return;
    ids.forEach(id=>{ TAGS[id]='junk'; writeTag(id,'junk'); }); renderWatched();
  }
  else if(t.dataset.p){ // perk cycle: off -> track -> high -> off
    const cfg=WATCH[t.dataset.w]; cfg.perks=cfg.perks||{};
    const n=t.dataset.p, cur=cfg.perks[n]||0;
    if(cur===0){ if(trackedCount(cfg)>=6){ t.textContent='6 max!'; setTimeout(()=>renderKeepingAnchor(t.dataset.w),900); return; } cfg.perks[n]=1; }
    else if(cur===1) cfg.perks[n]=2;
    else delete cfg.perks[n];
    save(); renderKeepingAnchor(t.dataset.w);
  }
  else if(t.dataset.st){ const cfg=WATCH[t.dataset.w]; cfg.stats=cfg.stats||[];
    cfg.stats=cfg.stats.includes(t.dataset.st)?cfg.stats.filter(s=>s!==t.dataset.st):[...cfg.stats,t.dataset.st];
    save(); renderKeepingAnchor(t.dataset.w);
  }
});
document.body.addEventListener('change',e=>{
  const mw=e.target.closest('select[data-mw]');
  if(mw){ WATCH[mw.dataset.mw].mw=mw.value; save(); renderKeepingAnchor(mw.dataset.mw); return; }
  const tg=e.target.closest('select[data-tag]');
  if(tg){ TAGS[tg.dataset.tag]=tg.value; saveTags(); renderWatched(); return; }  // reflect tag styling + junk count now
  const cb=e.target.closest('input[data-sel]');
  if(cb){ cb.checked?sel.add(cb.dataset.sel):sel.delete(cb.dataset.sel); }
});
$('q').oninput=e=>{q=e.target.value;renderAdd();};
$('refreshBtn').onclick=()=>load(true);
$('wSort').onchange=e=>{wSort=e.target.value;renderWatched();};
$('wOnlyHits').onchange=e=>{wOnlyHits=e.target.checked;renderWatched();};
$('selModeBtn').onclick=()=>{selMode=!selMode; if(!selMode) sel.clear(); renderWatched();};
$('expJunkBtn').onclick=()=>{
  const ids=DATA.weapons.filter(w=>tagOf(w)==='junk').map(w=>w.id);
  if(!ids.length){ const o=$('expJunkBtn').textContent; $('expJunkBtn').textContent='Nothing junked'; setTimeout(()=>$('expJunkBtn').textContent=o,1200); return; }
  copyText(ids.map(id=>`id:"${id}"`).join(' or '), $('expJunkBtn'), `Copied ${ids.length} ids ✓`);
};

async function load(fresh){
  $('status').textContent=fresh?'Pulling fresh drops from Bungie…':'Loading…';
  try{
    const [d,w,tg]=await Promise.all([
      fetch('/api/weapons'+(fresh?'?fresh=1':'')).then(r=>r.json()),
      fetch('/api/watch').then(r=>r.json()),
      fetch('/api/tags').then(r=>r.json()),
    ]);
    if(d.error) throw new Error(d.error);
    DATA=d; WATCH=w||{}; TAGS=tg||{};
    $('status').textContent=`${DATA.weapons.length} weapons · synced ${new Date(d.fetchedAt).toLocaleTimeString()}`;
    render();
  }catch(err){ $('status').textContent='Load failed: '+err.message; }
}
load(false);
</script>
</body>
</html>
