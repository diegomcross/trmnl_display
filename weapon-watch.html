<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapon Watch — God-Roll Tracker</title>
<style>
:root{
  --bg:#0c0e12; --panel:#151821; --panel2:#1b1f2b; --line:#2a2f3d;
  --ink:#e9ebf2; --mut:#8b93a7; --dim:#5c6375;
  --gold:#cfae42; --purp:#a97fd6; --keep:#5fd0dd; --rev:#e8b64c; --junk:#ff6a52;
  --clip:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font:15px/1.45 "Segoe UI",Roboto,system-ui,sans-serif;padding:12px;padding-bottom:40px}
.disp{font-family:Bahnschrift,"Roboto Condensed","Arial Narrow",sans-serif;text-transform:uppercase;letter-spacing:.09em}
h1{font-size:22px;font-weight:600}
h1 span{color:var(--gold)}
.sub{color:var(--mut);font-size:12px;margin:2px 0 12px}
.sub a{color:var(--keep);text-decoration:none}
.bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.btn{background:var(--panel2);border:1px solid var(--gold);color:var(--gold);padding:8px 13px;font-size:12px;cursor:pointer;clip-path:var(--clip);font-family:inherit}
.btn:active{background:var(--gold);color:#000}
.btn.sm{padding:4px 9px;font-size:10.5px}
.btn.red{border-color:var(--junk);color:var(--junk)}
.btn.mut{border-color:var(--line);color:var(--mut)}
input[type=search],select{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 10px;font-size:13px;clip-path:var(--clip);appearance:none}
select.sm{padding:3px 6px;font-size:11px}
input[type=search]{flex:1;min-width:160px}
input[type=checkbox]{accent-color:var(--gold);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.panel{background:var(--panel);border:1px solid var(--line);clip-path:var(--clip);padding:12px;margin-bottom:14px}
.panel h2{font-size:13px;color:var(--mut);margin-bottom:8px}
.card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);clip-path:var(--clip);margin-bottom:8px}
.whead{display:flex;justify-content:space-between;gap:8px;align-items:center;cursor:pointer;padding:10px 12px}
.whead .nm{font-weight:600;font-size:15px;color:var(--gold)}
.whead .sum{color:var(--mut);font-size:11.5px}
.wbody{padding:0 12px 10px;border-top:1px dashed var(--line)}
.meta{color:var(--mut);font-size:11.5px;margin:6px 0}
.meta b{color:var(--ink)}
details.trk{margin:6px 0}
details.trk summary{font-size:11px;color:var(--mut);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;font-family:Bahnschrift,"Roboto Condensed",sans-serif;list-style:none}
details.trk summary::after{content:" +";color:var(--gold)}
details.trk[open] summary::after{content:" –"}
.colh{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 4px;font-family:Bahnschrift,"Roboto Condensed",sans-serif}
.pool{display:flex;gap:4px;flex-wrap:wrap}
.pk{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:5px 9px;font-size:11px;cursor:pointer;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);font-family:inherit}
.pk.t1{background:rgba(95,208,221,.15);color:var(--keep);border-color:var(--keep)}
.pk.t2{background:rgba(207,174,66,.22);color:var(--gold);border-color:var(--gold);font-weight:600}
.pk.t2::before{content:"★ "}
.tools{display:flex;gap:5px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);padding:7px 0;font-size:11px;color:var(--dim)}
.copy{border-top:1px dashed var(--line);padding:7px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start}
.copy .body{flex:1;min-width:0}
.copy .cp{color:var(--mut)}
.copy .hit{color:var(--keep)}
.copy .hi{color:var(--gold);font-weight:600}
.copy .act{text-decoration:underline}
.score{font-size:11px;padding:2px 8px;clip-path:var(--clip);background:var(--panel2);color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap}
.score.hot{background:rgba(207,174,66,.2);color:var(--gold);font-weight:700}
.lockb{background:none;border:1px solid var(--line);color:var(--mut);cursor:pointer;font-size:13px;padding:2px 7px;clip-path:var(--clip)}
.lockb.on{border-color:var(--gold);color:var(--gold)}
.tagv{font-size:10.5px;color:var(--purp)}
.st{background:var(--panel2);padding:2px 7px;font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums;clip-path:var(--clip);display:inline-block;margin:2px 2px 0 0}
.st b{font-weight:600;color:var(--ink)}
.st.s1 b{color:var(--gold)} .st.s1{outline:1px solid var(--gold);outline-offset:-1px}
.st.s2 b{color:var(--keep)} .st.s2{outline:1px solid var(--keep);outline-offset:-1px}
.st.s3 b{color:var(--junk)} .st.s3{outline:1px solid var(--junk);outline-offset:-1px}
.row{display:flex;justify-content:space-between;gap:8px;align-items:center;border-top:1px solid var(--line);padding:8px 0}
.row .rn{font-weight:600;font-size:13px}
.row .ri{color:var(--mut);font-size:11px}
.count{color:var(--mut);font-size:12px;margin:8px 0}
.note{font-size:10.5px;color:var(--dim);margin-top:6px}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(min-width:760px){body{max-width:880px;margin:0 auto}}
</style>
</head>
<body>
<h1 class="disp">Weapon <span>Watch</span></h1>
<p class="sub">God-roll tracker · tap a card to expand · <a href="/">← Vault Verdict</a></p>
<div class="bar"><button class="btn" id="refreshBtn">Refresh from Bungie</button><span class="count" id="status" style="margin:0"></span></div>

<div id="watched"></div>

<div class="panel">
  <h2 class="disp">Add weapons to the watchlist</h2>
  <div class="bar"><input type="search" id="q" placeholder="Search weapon name / type…"></div>
  <div id="allList"></div>
</div>

<script>
let DATA={weapons:[],defs:{}}, WATCH={}, TAGS={}, q='';
const openCards=new Set(), sel=new Set();
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

// score: tracked perk anywhere on the roll counts its priority (normal 1, ★ high 2);
// masterwork match +1. Perks are keyed by NAME so enhanced variants match too.
function scoreCopy(w,cfg){
  let sc=0;
  const rollPerks=new Set([...w.cols[0],...w.cols[1]].map(p=>p.n));
  for(const [n,pr] of Object.entries(cfg.perks||{})) if(rollPerks.has(n)) sc+=pr;
  if(cfg.mw && w.mw===cfg.mw) sc+=1;
  return sc;
}
const trackedCount=cfg=>Object.keys(cfg.perks||{}).length;
const tagOf=w=>TAGS[w.id]!==undefined?TAGS[w.id]:(w.tag||'none');   // local overlay wins, then DIM, then none

const MWS=['range','stability','handling','reload','accuracy','blast_radius','velocity','impact','draw_time','charge_time','projectile_speed'];
const STAT_PICK=['Range','Stability','Handling','Reload Speed','Aim Assistance','Airborne Effectiveness','Zoom','Recoil Direction','Magazine','Blast Radius','Velocity','Impact','Accuracy','Charge Time','Draw Time'];
const TAG_OPTS=['none','keep','favorite','junk'];

function render(){
  const copiesOf={}; DATA.weapons.forEach(w=>{(copiesOf[w.hash]=copiesOf[w.hash]||[]).push(w);});

  $('watched').innerHTML=Object.entries(WATCH).map(([hash,cfg])=>{
    const d=DATA.defs[hash]; if(!d) return '';
    const copies=(copiesOf[hash]||[]).map(w=>({w,sc:scoreCopy(w,cfg)})).sort((a,b)=>b.sc-a.sc);
    const best=copies[0]?.sc??0;
    const isOpen=openCards.has(hash);
    const head=`<div class="whead" data-open="${hash}">
      <span><span class="nm">${esc(d.n)}</span> <span class="sum">· ${esc(d.ty)} · ${copies.length} cop${copies.length===1?'y':'ies'} · best score ${best} · tracking ${trackedCount(cfg)}/6</span></span>
      <span class="sum">${isOpen?'▾':'▸'}</span></div>`;
    if(!isOpen) return `<div class="card">${head}</div>`;

    // per-stat ranking across dupes: gold = highest possible, teal = 2nd, red = 3rd
    const rankOf={};
    for(const s of (cfg.stats||[])){
      const vals=[...new Set(copies.map(c=>c.w.statsMax[s]??-1))].sort((a,b)=>b-a);
      rankOf[s]=v=>{const i=vals.indexOf(v);return i===0?'s1':i===1?'s2':i===2?'s3':'';};
    }

    const mwOpts=[...new Set([...MWS,...copies.map(c=>c.w.mw).filter(Boolean)])];
    const poolBtns=ci=>(d.pool[ci]||[]).map(n=>{
      const pr=(cfg.perks||{})[n]||0;
      return `<button class="pk ${pr===1?'t1':pr===2?'t2':''}" data-w="${hash}" data-p="${esc(n)}">${esc(n)}</button>`;
    }).join('')||'<span class="note">no random perks in this column</span>';
    const statBtns=STAT_PICK.map(s=>{
      const on=(cfg.stats||[]).includes(s);
      return `<button class="pk ${on?'t1':''}" data-w="${hash}" data-st="${esc(s)}">${esc(s)}</button>`;
    }).join('');

    const copyRows=copies.map(({w,sc})=>{
      const col=ci=>w.cols[ci].map(p=>{
        const pr=(cfg.perks||{})[p.n]||0;
        return `<span class="${pr===2?'hi':pr===1?'hit':'cp'} ${p.on?'act':''}">${esc(p.n)}</span>`;
      }).join(' · ')||'—';
      const stats=(cfg.stats||[]).map(s=>{
        const v=w.statsMax[s];
        return `<span class="st ${v!==undefined?rankOf[s](v):''}">${esc(s)} <b>${v??'—'}</b></span>`;
      }).join('');
      const tag=tagOf(w);
      return `<div class="copy">
        <input type="checkbox" data-sel="${w.id}" ${sel.has(w.id)?'checked':''}>
        <div class="body">
          <span class="score ${sc>=3?'hot':''}">score ${sc}</span>
          <button class="lockb ${w.locked?'on':''}" data-lock="${w.id}" data-to="${w.locked?0:1}" title="${w.locked?'Unlock':'Lock'}">${w.locked?'🔒':'🔓'}</button>
          <select class="sm" data-tag="${w.id}">${TAG_OPTS.map(t=>`<option ${t===tag?'selected':''}>${t}</option>`).join('')}</select>
          <span class="cp">${w.own!=='Vault'?'on '+w.own:'Vault'} · ${w.pwr} · MW <span class="${cfg.mw&&w.mw===cfg.mw?'hi':'cp'}">${w.mw||'—'}</span></span>
          ${w.tag?`<span class="tagv"> DIM: ${w.tag}</span>`:'<span class="tagv"> DIM: none</span>'}
          <br><b>3:</b> ${col(0)}<br><b>4:</b> ${col(1)}${stats?`<br>${stats}`:''}
        </div></div>`;
    }).join('');

    return `<div class="card">${head}<div class="wbody">
      <div class="meta">${esc(d.ty)} · ${d.slot} · ${d.ammo} · ${d.dmg}${d.src?` · <b>${esc(d.src)}</b>`:''}
        <button class="btn sm red" style="float:right" data-unwatch="${hash}">Unwatch</button></div>
      <details class="trk"><summary>Edit tracking — perks / masterwork / stats</summary>
        <div class="colh">Column 3 — possible perks (tap: track → ★ high → off)</div><div class="pool">${poolBtns(0)}</div>
        <div class="colh">Column 4 — possible perks</div><div class="pool">${poolBtns(1)}</div>
        <div class="colh">Wanted masterwork</div>
        <select data-mw="${hash}"><option value="">any</option>${mwOpts.map(s=>`<option ${cfg.mw===s?'selected':''}>${s}</option>`).join('')}</select>
        <div class="colh">Watched stats — shows highest possible on each roll (barrel/mag included)</div><div class="pool">${statBtns}</div>
      </details>
      <div class="tools">
        <button class="btn sm mut" data-selall="${hash}">Select all</button>
        <button class="btn sm mut" data-selnone="${hash}">Clear</button>
        <span>tag selected:</span>
        ${TAG_OPTS.map(t=>`<button class="btn sm ${t==='junk'?'red':'mut'}" data-btag="${hash}" data-t="${t}">${t}</button>`).join('')}
        <button class="btn sm mut" data-block="${hash}" data-to="1">🔒 selected</button>
        <button class="btn sm mut" data-block="${hash}" data-to="0">🔓 selected</button>
        <button class="btn sm red" data-junkrest="${hash}">Junk all unselected</button>
      </div>
      ${copyRows||'<p class="note">No copies in the vault right now — new drops will be scored against this.</p>'}
    </div></div>`;
  }).join('')||'<p class="count">Nothing watched yet — add weapons below.</p>';

  const ql=q.toLowerCase();
  const rows=Object.entries(DATA.defs)
    .filter(([h,d])=>!WATCH[h]&&(!ql||d.n.toLowerCase().includes(ql)||d.ty.toLowerCase().includes(ql)))
    .sort((a,b)=>a[1].n.localeCompare(b[1].n));
  $('allList').innerHTML=rows.slice(0,ql?200:30).map(([h,d])=>`<div class="row">
    <div><div class="rn">${esc(d.n)}</div><div class="ri">${esc(d.ty)} · ${d.slot} · ${d.ammo} · ${d.dmg} · ${(copiesOf[h]||[]).length} in vault${d.src?` · ${esc(d.src)}`:''}</div></div>
    <button class="btn sm" data-watch="${h}">Watch</button></div>`).join('')
    +(rows.length>(ql?200:30)?`<p class="count">…${rows.length-(ql?200:30)} more — refine the search.</p>`:'');
}

const save=()=>fetch('/api/watch',{method:'POST',body:JSON.stringify(WATCH)});
const saveTags=()=>fetch('/api/tags',{method:'POST',body:JSON.stringify(TAGS)});
async function setLock(id,to){
  const r=await fetch('/api/lock',{method:'POST',body:JSON.stringify({id,locked:!!to})}).then(r=>r.json());
  if(r.error){ $('status').textContent='Lock failed: '+r.error; return false; }
  const w=DATA.weapons.find(x=>x.id===id); if(w) w.locked=!!to;
  return true;
}
const copyIds=hash=>DATA.weapons.filter(w=>w.hash===Number(hash)||String(w.hash)===hash).map(w=>w.id);

document.body.addEventListener('click',async e=>{
  if(e.target.closest('details.trk summary,select,input[type=checkbox]')) {
    const cb=e.target.closest('input[data-sel]');
    if(cb){ cb.checked?sel.add(cb.dataset.sel):sel.delete(cb.dataset.sel); }
    return;
  }
  const t=e.target.closest('[data-open],[data-watch],[data-unwatch],[data-lock],[data-selall],[data-selnone],[data-btag],[data-block],[data-junkrest],.pk');
  if(!t) return;
  if(t.dataset.open){ openCards.has(t.dataset.open)?openCards.delete(t.dataset.open):openCards.add(t.dataset.open); render(); }
  else if(t.dataset.watch){ const h=t.dataset.watch; WATCH[h]={name:DATA.defs[h].n,perks:{},mw:'',stats:[]}; openCards.add(h); save(); render(); }
  else if(t.dataset.unwatch){ if(confirm('Stop watching '+DATA.defs[t.dataset.unwatch].n+'?')){ delete WATCH[t.dataset.unwatch]; save(); render(); } }
  else if(t.dataset.lock){ t.disabled=true; if(await setLock(t.dataset.lock,+t.dataset.to)) render(); else t.disabled=false; }
  else if(t.dataset.selall){ copyIds(t.dataset.selall).forEach(id=>sel.add(id)); render(); }
  else if(t.dataset.selnone){ copyIds(t.dataset.selnone).forEach(id=>sel.delete(id)); render(); }
  else if(t.dataset.btag){ for(const id of copyIds(t.dataset.btag)) if(sel.has(id)) TAGS[id]=t.dataset.t; saveTags(); render(); }
  else if(t.dataset.block){ t.disabled=true; for(const id of copyIds(t.dataset.block)) if(sel.has(id)) await setLock(id,+t.dataset.to); render(); }
  else if(t.dataset.junkrest){
    const ids=copyIds(t.dataset.junkrest).filter(id=>!sel.has(id));
    if(!ids.length||!confirm(`Tag ${ids.length} unselected cop${ids.length===1?'y':'ies'} as junk?`)) return;
    ids.forEach(id=>TAGS[id]='junk'); saveTags(); render();
  }
  else if(t.dataset.p){ // perk cycle: off -> track -> high -> off
    const cfg=WATCH[t.dataset.w]; cfg.perks=cfg.perks||{};
    const n=t.dataset.p, cur=cfg.perks[n]||0;
    if(cur===0){ if(trackedCount(cfg)>=6){ t.textContent='6 max!'; setTimeout(render,900); return; } cfg.perks[n]=1; }
    else if(cur===1) cfg.perks[n]=2;
    else delete cfg.perks[n];
    save(); render();
  }
  else if(t.dataset.st){ const cfg=WATCH[t.dataset.w]; cfg.stats=cfg.stats||[];
    cfg.stats=cfg.stats.includes(t.dataset.st)?cfg.stats.filter(s=>s!==t.dataset.st):[...cfg.stats,t.dataset.st];
    save(); render();
  }
});
document.body.addEventListener('change',e=>{
  const mw=e.target.closest('select[data-mw]');
  if(mw){ WATCH[mw.dataset.mw].mw=mw.value; save(); render(); return; }
  const tg=e.target.closest('select[data-tag]');
  if(tg){ TAGS[tg.dataset.tag]=tg.value; saveTags(); }
  const cb=e.target.closest('input[data-sel]');
  if(cb){ cb.checked?sel.add(cb.dataset.sel):sel.delete(cb.dataset.sel); }
});
$('q').oninput=e=>{q=e.target.value;render();};
$('refreshBtn').onclick=()=>load(true);

async function load(fresh){
  $('status').textContent=fresh?'Pulling fresh drops from Bungie…':'Loading…';
  try{
    const [d,w,tg]=await Promise.all([
      fetch('/api/weapons'+(fresh?'?fresh=1':'')).then(r=>r.json()),
      fetch('/api/watch').then(r=>r.json()),
      fetch('/api/tags').then(r=>r.json()),
    ]);
    if(d.error) throw new Error(d.error);
    DATA=d; WATCH=w||{}; TAGS=tg||{};
    $('status').textContent=`${DATA.weapons.length} weapons · synced ${new Date(d.fetchedAt).toLocaleTimeString()}`;
    render();
  }catch(err){ $('status').textContent='Load failed: '+err.message; }
}
load(false);
</script>
</body>
</html>
